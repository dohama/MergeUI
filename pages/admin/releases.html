  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex}a{color:inherit;text-decoration:none}.sb-logo span{font-size:15px;font-weight:900;letter-spacing:-0.5px}

<script>
function escapeHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r = await sb.from("releases").select("*").order("published_at", { ascending: false, nullsFirst: false }).order("created_at", { ascending: false });
    if (r.error) throw r.error;
    var data=r.data||[];
    var list=document.querySelector(".releases-list");
    if(data.length>0){
      list.innerHTML=data.map(function(rel){
        var d=new Date(rel.published_at||rel.created_at);
        var ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        var st=(rel.status||"draft").toLowerCase();
        var body=escapeHtml((rel.body||"").substring(0,120));
        return'<div class="release-card"><div class="release-head"><div class="release-info"><span class="ver-tag">'+escapeHtml(rel.version||"--")+'</span><span class="release-title">'+escapeHtml(rel.title||"--")+'</span><span class="release-date">'+ds+'</span></div><div class="release-meta"><span class="status-badge '+st+'">'+st+'</span><div class="act-btns"><button type="button" class="act-btn">편집</button><button type="button" class="act-btn danger">삭제</button></div></div></div>'+(body?'<div class="release-body"><p style="font-size:13px;color:var(--text-secondary)">'+body+(rel.body&&rel.body.length>120?'...':'')+'</p></div>':'')+'</div>';
      }).join('');
    } else {
      list.innerHTML='<div style="text-align:center;padding:48px 24px;color:var(--text-muted)"><div style="font-size:40px;margin-bottom:12px;opacity:0.3">&#128230;</div><div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">No releases yet</div><div style="font-size:13px">Create your first release.</div></div>';
    }

    // 편집/삭제 이벤트 위임
    list.addEventListener('click', async function(e) {
      var btn = e.target.closest('.act-btn');
      if (!btn) return;
      var card = btn.closest('.release-card');
      var idx = Array.from(list.children).indexOf(card);
      var rel = data[idx];
      if (!rel) return;
      if (btn.classList.contains('danger')) {
        var ok = await AdminModal.showConfirm({
          title: 'Delete release',
          message: 'Delete "' + (rel.title || rel.version || '') + '"? This action cannot be undone.',
          confirmLabel: 'Delete', destructive: true
        });
        if (!ok) return;
        var { error } = await sb.from('releases').delete().eq('id', rel.id);
        if (error) { alert('Delete failed: ' + error.message); return; }
        card.remove(); data.splice(idx, 1);
      } else {
        var values = await AdminModal.showFormModal({
          title: 'Edit release',
          submitLabel: 'Save',
          fields: [
            { name:'version', label:'Version', type:'text', value: rel.version || '', required:true },
            { name:'title', label:'Title', type:'text', value: rel.title || '', required:true },
            { name:'body', label:'Body (markdown)', type:'textarea', value: rel.body || '' },
            { name:'status', label:'Status', type:'select', value: rel.status || 'draft',
              options:['draft','published'] }
          ],
          onSubmit: async function(v){
            var update = {
              version: v.version, title: v.title, body: v.body || '', status: v.status
            };
            if (v.status === 'published' && rel.status !== 'published') update.published_at = new Date().toISOString();
            var { error } = await sb.from('releases').update(update).eq('id', rel.id);
            if (error) throw new Error('Update failed: ' + error.message);
          }
        });
        if (values) location.reload();
      }
    });
  } catch(e) {
    console.error(e);
    var list=document.querySelector(".releases-list");
    if(list) list.innerHTML='<div style="text-align:center;padding:48px 24px;color:var(--text-muted)"><div style="font-size:40px;margin-bottom:12px;opacity:0.3">&#9888;&#65039;</div><div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">Failed to load releases</div><div style="font-size:13px">Please try again in a moment.</div></div>';
  }
});

// Add release — modal form
document.querySelector('.add-btn').addEventListener('click', async function() {
  if (!MergeDB || !MergeDB.client) { alert('Service is initializing. Please retry.'); return; }
  var values = await AdminModal.showFormModal({
    title: 'Add release note',
    submitLabel: 'Create',
    fields: [
      { name:'version', label:'Version', type:'text', placeholder:'1.2.0', required:true },
      { name:'title', label:'Title', type:'text', required:true },
      { name:'body', label:'Body (markdown)', type:'textarea', placeholder:'## What is new\n- ...' },
      { name:'status', label:'Status', type:'select', value:'draft', options:['draft','published'] }
    ],
    onSubmit: async function(v){
      var insert = { version: v.version, title: v.title, body: v.body || '', status: v.status };
      if (v.status === 'published') insert.published_at = new Date().toISOString();
      var { error } = await MergeDB.client.from('releases').insert(insert);
      if (error) throw new Error('Create failed: ' + error.message);
    }
  });
  if (values) location.reload();
});
</script>
