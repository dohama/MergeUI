  <style>
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font); background: var(--bg-base); color: var(--text-primary); min-height: 100vh; display: flex; }
    a { color: inherit; text-decoration: none; }

    .auth-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; width: 100%; }
    .auth-form-side { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; position: relative; }
    .auth-visual-side { background: var(--bg-raised); border-right: 1px solid var(--border); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .auth-visual-side .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.35; pointer-events: none; }
    .auth-visual-side .orb-1 { width: 500px; height: 500px; background: var(--brand); top: -100px; left: -100px; animation: orbFloat 20s ease-in-out infinite; }
    .auth-visual-side .orb-2 { width: 350px; height: 350px; background: var(--accent); bottom: -80px; right: -50px; animation: orbFloat 25s ease-in-out infinite reverse; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }

    .visual-content { position: relative; z-index: 1; text-align: center; padding: 60px; }
    .visual-quote { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.3; margin-bottom: 16px; max-width: 400px; }
    .visual-quote .gradient-text { background: linear-gradient(135deg, var(--brand-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .visual-author { font-size: 14px; color: var(--text-muted); }

    .visual-preview { margin-top: 40px; width: 360px; border-radius: 16px; border: 1px solid var(--border-strong); overflow: hidden; background: var(--bg-surface); box-shadow: 0 24px 48px rgba(0,0,0,0.4), 0 0 80px var(--glow-brand); transform: perspective(800px) rotateY(-5deg) rotateX(2deg); }
    .vp-bar { display: flex; gap: 6px; padding: 10px 14px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); }
    .vp-dot { width: 8px; height: 8px; border-radius: 50%; }
    .vp-dot.r { background: #FF5F57; } .vp-dot.y { background: #FFBD2E; } .vp-dot.g { background: #28C840; }
    .vp-body { display: grid; grid-template-columns: 60px 1fr; min-height: 200px; }
    .vp-side { background: rgba(0,0,0,0.2); border-right: 1px solid var(--border); padding: 12px 8px; }
    .vp-side-item { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-bottom: 8px; }
    .vp-side-item.active { background: var(--glow-brand); }
    .vp-main { padding: 14px; }
    .vp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .vp-stat { padding: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; }
    .vp-stat-val { font-size: 16px; font-weight: 800; }
    .vp-stat-lbl { font-size: 8px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
    .vp-chart { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
    .vp-bar-chart { flex: 1; border-radius: 2px 2px 0 0; background: linear-gradient(to top, var(--brand-dark), var(--brand-light)); opacity: 0.6; }

    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
    .auth-logo .logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--brand), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: white; }
    .auth-logo .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .auth-card { width: 100%; max-width: 400px; }
    .auth-card h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .auth-card .subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 16px; background: var(--bg-raised); border: 1px solid var(--border-strong); border-radius: 10px; color: var(--text-primary); font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--glow-brand); }
    .submit-btn { width: 100%; padding: 14px; background: var(--brand); color: white; font-size: 15px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-family: var(--font); box-shadow: 0 0 24px var(--glow-brand); }
    .submit-btn:hover { background: var(--brand-light); transform: translateY(-1px); box-shadow: 0 0 40px rgba(108,92,231,0.3); }
    .auth-footer { margin-top: 24px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .auth-footer a { color: var(--brand-light); font-weight: 600; }
    .auth-footer a:hover { color: var(--accent); }

    @media (max-width: 768px) {
      .auth-layout { grid-template-columns: 1fr; }
      .auth-visual-side { display: none; }
      .auth-form-side { padding: 24px; }
    }

<body>
<div class="auth-layout">
  <div class="auth-visual-side">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="visual-content">
      <div class="visual-quote">
        "Your account security is our <span class="gradient-text">top priority</span>."
      </div>
      <div class="visual-author">— MergeUi Security Team</div>
      <div class="visual-preview">
        <div class="vp-bar"><span class="vp-dot r"></span><span class="vp-dot y"></span><span class="vp-dot g"></span></div>
        <div class="vp-body">
          <div class="vp-side"><div class="vp-side-item active"></div><div class="vp-side-item"></div><div class="vp-side-item"></div><div class="vp-side-item"></div><div class="vp-side-item"></div></div>
          <div class="vp-main">
            <div class="vp-stats">
              <div class="vp-stat"><div class="vp-stat-val">$45.2K</div><div class="vp-stat-lbl">Revenue</div></div>
              <div class="vp-stat"><div class="vp-stat-val">2,340</div><div class="vp-stat-lbl">Users</div></div>
            </div>
            <div class="vp-chart">
              <div class="vp-bar-chart" style="height:35%"></div><div class="vp-bar-chart" style="height:55%"></div><div class="vp-bar-chart" style="height:42%"></div><div class="vp-bar-chart" style="height:78%"></div><div class="vp-bar-chart" style="height:50%"></div><div class="vp-bar-chart" style="height:65%"></div><div class="vp-bar-chart" style="height:88%"></div><div class="vp-bar-chart" style="height:58%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card">
      <a href="../../landing/index.html" class="auth-logo">
        <span class="logo-mark">O</span>
        <span class="logo-text">MergeUi</span>
      </a>
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your new password below.</p>
      <form>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="form-input" placeholder="Enter new password (min 8 characters)" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password" autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn">Reset Password</button>
      </form>
      <div class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
function showError(msg) {
  var el = document.getElementById('auth-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-error';
    el.style.cssText = 'padding:12px 16px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#FCA5A5;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px';
    document.querySelector('form').prepend(el);
  }
  el.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' + msg;
  el.style.display = 'flex';
}
function showSuccess(msg) {
  var el = document.getElementById('auth-success');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-success';
    el.style.cssText = 'padding:12px 16px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:10px;color:#86EFAC;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px';
    document.querySelector('form').prepend(el);
  }
  el.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' + msg;
  el.style.display = 'flex';
}

document.querySelector('form').onsubmit = function(e) {
  e.preventDefault();
  var err = document.getElementById('auth-error');
  if (err) err.style.display = 'none';

  var pw = document.getElementById('newPassword').value;
  var cpw = document.getElementById('confirmPassword').value;

  if (!pw || !cpw) { showError('Please fill in both fields.'); return; }
  if (pw.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (pw !== cpw) { showError('Passwords do not match.'); return; }

  // Supabase API로 실제 비밀번호 변경
  if (window.MergeDB && window.MergeDB.client) {
    var btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';
    MergeDB.client.auth.updateUser({ password: pw }).then(function(result) {
      if (result.error) {
        showError(result.error.message || 'Failed to reset password.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      } else {
        // Loops 연락처 동기화 — 비밀번호 변경 후 최신 상태 반영 (실패 무시)
        try {
          MergeDB.client.auth.getSession().then(function(r) {
            var token = r && r.data && r.data.session && r.data.session.access_token;
            if (token && typeof MergeDB._syncLoops === 'function') {
              MergeDB._syncLoops(token).catch(function() {});
            }
          });
        } catch (e) { /* 무시 */ }
        showSuccess('Password reset successfully! Redirecting to sign in...');
        setTimeout(function() { window.location.href = 'login.html'; }, 1500);
      }
    });
  } else {
    showError('Service unavailable. Please try again later.');
  }
};
</script>
<script src="../../src/js/cookie-consent.js"></script>
</body>
