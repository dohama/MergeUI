  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex}a{color:inherit;text-decoration:none}
    .sidebar{width:240px;height:100vh;background:var(--bg-raised);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0}.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}.sb-logo .mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#EF4444,#F97316);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:white}.sb-logo span{font-size:15px;font-weight:900;letter-spacing:-0.5px}.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}.sb-group{margin-bottom:16px}.sb-label{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:4px 12px;margin-bottom:4px}.sb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:var(--text-muted);transition:all 0.12s;cursor:pointer;font-weight:500}.sb-item:hover{background:rgba(255,255,255,0.03);color:var(--text-secondary)}.sb-item.active{background:rgba(239,68,68,0.1);color:#FCA5A5}.sb-item .sb-icon{width:18px;height:18px;border-radius:4px;border:1.5px solid currentColor;opacity:0.4;flex-shrink:0}.sb-item.active .sb-icon{opacity:0.7}
    .main{margin-left:240px;flex:1;min-height:100vh}.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-raised)}.topbar-left{display:flex;align-items:center;gap:12px}.topbar h1{font-size:20px;font-weight:800}.topbar .admin-badge{padding:3px 10px;background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:10px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}.content{padding:28px}
    .add-btn{padding:8px 20px;background:linear-gradient(135deg,#EF4444,#F97316);color:white;font-size:12px;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:var(--font);transition:all 0.15s}.add-btn:hover{opacity:0.9;transform:translateY(-1px)}
    .releases-list{display:flex;flex-direction:column;gap:16px}
    .release-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.15s}.release-card:hover{border-color:var(--border-strong)}
    .release-head{padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .release-info{display:flex;align-items:center;gap:12px}
    .ver-tag{padding:4px 12px;background:linear-gradient(135deg,var(--brand),var(--accent));color:white;font-size:12px;font-weight:800;border-radius:6px;letter-spacing:0.5px}
    .release-title{font-size:16px;font-weight:700}
    .release-date{font-size:12px;color:var(--text-muted)}
    .release-meta{display:flex;align-items:center;gap:10px}
    .status-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}.status-badge.published{background:rgba(34,197,94,0.12);color:var(--success)}.status-badge.draft{background:rgba(251,191,36,0.12);color:var(--warning)}
    .명 알림-badge{font-size:11px;color:var(--text-muted)}
    .act-btns{display:flex;gap:6px}.act-btn{padding:4px 12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:var(--font);transition:all 0.12s}.act-btn:hover{border-color:var(--brand);color:var(--brand-light)}.act-btn.danger{color:#FCA5A5;border-color:rgba(239,68,68,0.2)}.act-btn.danger:hover{background:rgba(239,68,68,0.1)}
    .release-body{padding:0 24px 20px;border-top:1px solid var(--border);margin-top:0;padding-top:16px}
    .change-list{list-style:none;display:flex;flex-direction:column;gap:6px}
    .change-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary)}
    .change-type{padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase}.change-type.new{background:rgba(34,197,94,0.12);color:var(--success)}.change-type.fix{background:rgba(239,68,68,0.12);color:#FCA5A5}.change-type.improve{background:rgba(108,92,231,0.12);color:var(--brand-light)}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.content{padding:20px}.release-head{flex-direction:column;align-items:flex-start}}
  </style>

    <div class="sb-footer" style="padding:16px;border-top:1px solid var(--border)">
      <div class="sb-user" style="display:flex;align-items:center;gap:10px">
        <div class="sb-avatar" style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white">A</div>
        <div>
          <div class="sb-user-name" style="font-size:13px;font-weight:600">Admin</div>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left"><h1>릴리즈 관리</h1><span class="admin-badge">관리자</span></div>

    <div class="content">
      <div class="releases-list">
        <div style="text-align:center;padding:48px 24px;color:var(--text-muted)">
          <div style="font-size:40px;margin-bottom:12px;opacity:0.3">&#128230;</div>
          <div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">No releases published</div>
          <div style="font-size:13px">Create your first release to notify subscribers.</div>
        </div>
      </div>
    </div>
  </main>
<script>
(function(){var s=JSON.parse(localStorage.getItem('mergeui_session'));if(!s){return;}})();
</script>

<nav class="mobile-bottom-nav" aria-label="Mobile navigation"><div class="mobile-bottom-nav-inner"><a href="dashboard.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>홈</a><a href="subscribers.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>구독자</a><a href="orders.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>주문</a><a href="settings.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7l-1.4 1.4M6.7 17.3l-1.4 1.4m0-13.4l1.4 1.4m10.6 10.6l1.4 1.4"/></svg>설정</a></div></nav>
<script>
function escapeHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r = await sb.from("releases").select("*").order("published_at", { ascending: false });
    var data=r.data||[];
    var list=document.querySelector(".releases-list");
    if(data.length>0){
      list.innerHTML=data.map(function(rel){
        var d=new Date(rel.published_at||rel.created_at);
        var ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        var st=(rel.status||"draft").toLowerCase();
        var body=escapeHtml((rel.body||"").substring(0,120));
        return'<div class="release-card"><div class="release-head"><div class="release-info"><span class="ver-tag">'+escapeHtml(rel.version||"--")+'</span><span class="release-title">'+escapeHtml(rel.title||"--")+'</span><span class="release-date">'+ds+'</span></div><div class="release-meta"><span class="status-badge '+st+'">'+st+'</span><div class="act-btns"><button type="button" class="act-btn">편집</button><button type="button" class="act-btn danger">삭제</button></div></div></div>'+(body?'<div class="release-body"><p style="font-size:13px;color:var(--text-secondary)">'+body+(rel.body&&rel.body.length>120?'...':'')+'</p></div>':'')+'</div>';
      }).join('');
    } else {
      list.innerHTML='<div style="text-align:center;padding:48px 24px;color:var(--text-muted)"><div style="font-size:40px;margin-bottom:12px;opacity:0.3">&#128230;</div><div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">릴리즈 노트가 없습니다</div><div style="font-size:13px">첫 릴리즈를 작성해보세요.</div></div>';
    }
  } catch(e) { console.error(e); }
});
</script>
