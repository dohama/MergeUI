<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dropdown — MergeUi Block</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;gap:24px}

    /* === COPY FROM HERE === */
    .dropdown{position:relative;display:inline-block}
    .dropdown-toggle{
      display:inline-flex;align-items:center;gap:6px;
      padding:9px 14px;
      background:var(--merge-bg-surface);border:1px solid var(--merge-border-strong);
      border-radius:8px;
      font:inherit;font-size:13px;font-weight:600;color:var(--merge-text-primary);
      cursor:pointer;
    }
    .dropdown-toggle:hover{border-color:var(--merge-brand-light)}
    .dropdown-toggle svg{transition:transform .15s ease}
    .dropdown[data-open="true"] .dropdown-toggle svg{transform:rotate(180deg)}
    .dropdown-menu{
      position:absolute;top:calc(100% + 6px);left:0;
      min-width:200px;
      background:var(--merge-bg-raised);
      border:1px solid var(--merge-border);
      border-radius:10px;
      box-shadow:0 12px 32px -8px rgba(0,0,0,.35);
      padding:6px;
      z-index:50;
      opacity:0;visibility:hidden;transform:translateY(-4px);
      transition:opacity .15s ease,transform .15s ease,visibility .15s;
    }
    .dropdown[data-open="true"] .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0)}
    .dropdown-item{
      display:flex;align-items:center;gap:10px;
      padding:8px 10px;border-radius:6px;
      font-size:13px;color:var(--merge-text-primary);
      cursor:pointer;text-decoration:none;
    }
    .dropdown-item:hover{background:var(--merge-bg-surface)}
    .dropdown-item-icon{width:14px;height:14px;color:var(--merge-text-muted);flex-shrink:0}
    .dropdown-divider{height:1px;background:var(--merge-border);margin:4px 0}
    .dropdown-item-danger{color:var(--merge-danger,#EF4444)}
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <div class="dropdown" data-open="true">
    <button class="dropdown-toggle">
      Options
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="dropdown-menu" role="menu">
      <a class="dropdown-item" role="menuitem"><svg class="dropdown-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Edit</a>
      <a class="dropdown-item" role="menuitem"><svg class="dropdown-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Duplicate</a>
      <a class="dropdown-item" role="menuitem"><svg class="dropdown-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>Share</a>
      <div class="dropdown-divider"></div>
      <a class="dropdown-item dropdown-item-danger" role="menuitem"><svg class="dropdown-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/></svg>Delete</a>
    </div>
  </div>
</body>
</html>
