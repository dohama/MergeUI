<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Alert — MergeUi Block</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:14px}
    .demo-wrap{width:100%;max-width:560px;display:flex;flex-direction:column;gap:14px}

    /* === COPY FROM HERE === */
    .alert{
      display:flex;align-items:flex-start;gap:10px;
      padding:12px 16px;
      border:1px solid transparent;border-radius:8px;
      font-family:inherit;font-size:14px;line-height:1.5;
    }
    .alert svg{flex-shrink:0;margin-top:2px}
    .alert strong{font-weight:700;margin-right:4px}
    .alert-info{
      background:rgba(59,130,246,.10);
      border-color:rgba(59,130,246,.25);
      color:var(--merge-info);
    }
    .alert-success{
      background:rgba(34,197,94,.10);
      border-color:rgba(34,197,94,.25);
      color:var(--merge-success);
    }
    .alert-warning{
      background:rgba(251,191,36,.10);
      border-color:rgba(251,191,36,.25);
      color:var(--merge-warning);
    }
    .alert-error{
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.25);
      color:var(--merge-error);
    }
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <div class="demo-wrap">
    <div class="alert alert-info" role="status">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <div><strong>Heads up.</strong> A new release v1.2 is now available.</div>
    </div>

    <div class="alert alert-success" role="status">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div><strong>Saved.</strong> Your billing details have been updated.</div>
    </div>

    <div class="alert alert-warning" role="status">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <div><strong>Heads up.</strong> Your trial expires in 3 days.</div>
    </div>

    <div class="alert alert-error" role="alert">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div><strong>Payment failed.</strong> Please update your card to continue.</div>
    </div>
  </div>
</body>
</html>
