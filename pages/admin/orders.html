<script>
function escapeHtml(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
window.__ordersData = [];
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r = await sb.from("orders").select("*").order("created_at", { ascending: false });
    var data=r.data||[];
    window.__ordersData = data;
    var tot=0,mo=0,ref=0,ms=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString();
    data.forEach(function(o){if(o.status==="paid"){tot+=(o.amount||0);if(o.created_at>=ms)mo+=(o.amount||0);}if(o.status==="refunded")ref++;});
    var qv=document.querySelectorAll(".qs-val");
    if(qv[0])qv[0].textContent="$"+tot.toLocaleString();
    if(qv[1])qv[1].textContent="$"+mo.toLocaleString();
    if(qv[2])qv[2].textContent=data.length;
    if(qv[3])qv[3].textContent=ref;

    var emptyDiv=document.querySelector(".card > div[style*='text-align:center']");
    var tbody=document.querySelector(".o-table tbody");
    var pageInfo=document.querySelector(".page-info");

    if(data.length>0){
      if(emptyDiv)emptyDiv.style.display="none";
      tbody.innerHTML=data.map(function(o){
        var d=new Date(o.created_at);
        var dateStr=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        var statusClass=(o.status||"pending").toLowerCase();
        return '<tr><td><span class="order-id">'+escapeHtml((o.id||"").substring(0,8))+'</span></td><td><span class="cust-name">'+escapeHtml(o.customer_name||o.user_id||"--")+'</span></td><td>'+escapeHtml(o.plan||"--")+'</td><td><span class="amount">$'+(o.amount||0).toLocaleString()+'</span></td><td><span class="status-badge '+statusClass+'">'+statusClass+'</span></td><td>'+dateStr+'</td><td><div class="act-btns"><button type="button" class="act-btn">상세</button></div></td></tr>';
      }).join('');
      if(pageInfo)pageInfo.textContent="표시 "+data.length+" / "+data.length;
    }
  } catch(e) { console.error(e); }
});

document.addEventListener("DOMContentLoaded", function() {
  var btn = document.getElementById("exportBtn");
  if (!btn) return;
  btn.addEventListener("click", function() {
    if (!window.MergeCSV) { alert("CSV 모듈이 로드되지 않았습니다"); return; }
    var data = window.__ordersData || [];
    if (!data.length) { alert("내보낼 주문 데이터가 없습니다"); return; }
    var headers = ["주문번호", "Lemonsqueezy 주문ID", "고객 user_id", "플랜", "금액", "통화", "상태", "주문일시"];
    var rows = data.map(function(o) {
      return [
        o.id || "",
        o.lemon_order_id || "",
        o.user_id || "",
        o.plan || "",
        o.amount || 0,
        o.currency || "USD",
        o.status || "",
        MergeCSV.formatDate(o.created_at)
      ];
    });
    MergeCSV.export("mergeui_orders_" + MergeCSV.timestamp() + ".csv", headers, rows);
  });
});
</script>
