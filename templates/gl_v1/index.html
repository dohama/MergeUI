<main class="gl-main">
  <!-- ============================================
       Topbar (유리)
       ============================================ -->
  <header class="gl-topbar">
    <h1>Overview</h1>
    <div class="gl-top-actions">
      <button type="button" class="gl-btn-glass">+ New Workspace</button>
      <div class="gl-avatar">SC</div>
    </div>
  </header>

  <!-- ============================================
       KPI Grid — data.js의 GL_DATA.kpi
       ============================================ -->
  <section class="gl-kpi-grid" id="kpiGrid" aria-label="Key metrics"></section>

  <!-- ============================================
       2열 그리드 — 차트 + 최근 활동
       ============================================ -->
  <section class="gl-two-col">
    <div class="gl-card">
      <h2>API & User Activity (Last 7 Days)</h2>
      <div style="height:280px"><canvas id="activityChart"></canvas></div>
    </div>
    <div class="gl-card">
      <h2>Recent Activity</h2>
      <div class="gl-activity" id="activityList"></div>
    </div>
  </section>

  <!-- ============================================
       워크스페이스 테이블 — GL_DATA.workspaces
       ============================================ -->
  <section class="gl-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">Workspaces</h2>
      <button type="button" class="gl-btn-primary">+ Create Workspace</button>
    </div>
    <table class="gl-table">
      <thead><tr><th>Name</th><th>Members</th><th>Plan</th><th>Status</th><th>Activity</th></tr></thead>
      <tbody id="workspacesBody"></tbody>
    </table>
  </section>
</main>
