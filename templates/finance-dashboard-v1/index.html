  <link rel="stylesheet" href="css/fin-dashboard.css">
</head>
<body>

      <a href="transactions.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 4H3"/><path d="M21 12H3"/><path d="M21 20H3"/></svg><span class="nav-text">Transactions</span></a>
      <a href="portfolio.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2v10l7 4"/></svg><span class="nav-text">Portfolio</span></a>
      <a href="budget.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg><span class="nav-text">Budget</span></a>
      <a href="reports.html" class="sb-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-text">Reports</span></a>
    </nav>
    <div class="sb-footer"><div class="sb-user"><div class="sb-avatar">JD</div><div class="sb-user-info"><div class="sb-user-name">John Doe</div><div class="sb-user-role">Personal</div></div></div></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left"><button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('expanded')" aria-label="Toggle sidebar"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><h1 class="topbar-title">Overview</h1></div>
      <div class="topbar-right">
        <div class="topbar-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search..." aria-label="Search"></div>
        <button class="topbar-icon" aria-label="Notifications"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="topbar-dot"></span></button>
        <div class="sb-avatar" style="width:32px;height:32px;font-size:11px">JD</div>
      </div>
    </header>
    <div class="content">
      <section class="kpi-grid" aria-label="Key metrics">
        <div class="kpi-card"><div class="kpi-icon primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg></div><div class="kpi-row"><span class="kpi-value">$84,254</span><span class="kpi-trend up">+3.2%</span></div><div class="kpi-label">Total Balance</div></div>
        <div class="kpi-card"><div class="kpi-icon primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="kpi-row"><span class="kpi-value">$12,580</span><span class="kpi-trend up">+8.1%</span></div><div class="kpi-label">Monthly Income</div></div>
        <div class="kpi-card"><div class="kpi-icon warning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg></div><div class="kpi-row"><span class="kpi-value">$7,320</span><span class="kpi-trend up">+2.4%</span></div><div class="kpi-label">Monthly Expenses</div></div>
        <div class="kpi-card"><div class="kpi-icon info"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="kpi-row"><span class="kpi-value">41.8%</span><span class="kpi-trend up">+1.5%</span></div><div class="kpi-label">Savings Rate</div></div>
      </section>
      <div class="row row-8-4">
        <div class="card"><div class="card-header"><span class="card-title">Income vs Expenses</span><button class="clay-btn clay-btn-outline clay-btn-sm">This Year</button></div><div class="card-body"><div class="chart-container" style="height:300px;padding:0"><canvas id="incomeExpenseChart"></canvas></div></div></div>
        <div class="card"><div class="card-header"><span class="card-title">Recent Transactions</span></div><div class="card-body" id="recentTxnList" style="padding-top:var(--fin-space-3)"></div></div>
      </div>
      <div class="card"><div class="card-header"><span class="card-title">Budget Progress</span><a href="budget.html" class="clay-btn clay-btn-outline clay-btn-sm">View All</a></div><div class="card-body" id="budgetOverviewList"></div></div>
    </div>
  </main>
  <nav class="mobile-nav" aria-label="Mobile navigation"><div class="mobile-nav-inner">
    <a href="index.html" class="mobile-nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a>
    <a href="transactions.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H3"/><path d="M21 12H3"/><path d="M21 20H3"/></svg>Txns</a>
    <a href="portfolio.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v10l7 4"/></svg>Portfolio</a>
    <a href="budget.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg>Budget</a>
    <a href="reports.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Reports</a>
  </div></nav>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/data.js"></script>
  <script src="js/fin-dashboard.js"></script>
  <script>
    applyFinChartDefaults(); var D = FIN_DATA;
    var kc = document.querySelectorAll('.kpi-card');
    if (D.kpi && kc.length === D.kpi.length) D.kpi.forEach(function(k,i){ var c=kc[i]; c.querySelector('.kpi-value').textContent=k.value; var t=c.querySelector('.kpi-trend'); t.textContent=k.trend; t.className='kpi-trend '+k.dir; c.querySelector('.kpi-label').textContent=k.label; });
    try { new Chart(document.getElementById('incomeExpenseChart'),{type:'bar',data:{labels:D.incomeExpenseChart.labels,datasets:[{label:'Income',data:D.incomeExpenseChart.income,backgroundColor:'#00B894',borderRadius:8},{label:'Expenses',data:D.incomeExpenseChart.expenses,backgroundColor:'#E17055',borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{usePointStyle:true,pointStyle:'circle',padding:20,font:{size:12}}}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:function(v){return '$'+(v/1000)+'k';}}},x:{grid:{display:false}}}}}); } catch(e){console.warn(e);}
    var txnEl=document.getElementById('recentTxnList');
    if(txnEl&&D.recentTransactions){txnEl.innerHTML=D.recentTransactions.map(function(t){var c=t.type==='income'?'var(--fin-success)':'var(--fin-error)';var bg=t.type==='income'?'rgba(0,184,148,0.08)':'rgba(225,112,85,0.08)';return '<div style="display:flex;align-items:center;justify-content:space-between;padding:var(--fin-space-3) 0;border-bottom:1px solid var(--fin-border-default)"><div class="txn-row"><div class="txn-icon" style="background:'+bg+'">'+t.icon+'</div><div><div style="font-weight:600;font-size:13px">'+t.desc+'</div><div style="font-size:12px;color:var(--fin-text-muted)">'+t.cat+' \u00b7 '+t.date+'</div></div></div><div style="font-weight:600;font-size:14px;color:'+c+'">'+t.amount+'</div></div>';}).join('');}
    var bEl=document.getElementById('budgetOverviewList');
    if(bEl&&D.budgetOverview){bEl.innerHTML=D.budgetOverview.map(function(b){var p=Math.round(b.spent/b.budget*100);return '<div class="budget-item"><div class="budget-header"><span class="budget-cat">'+b.cat+'</span><span class="budget-amounts"><strong>$'+b.spent.toLocaleString()+'</strong> / $'+b.budget.toLocaleString()+'</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+p+'%;background:'+b.color+'"></div></div></div>';}).join('');}
  </script>
</body>
</html>
