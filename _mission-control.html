1<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MergeUi — Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070B;--bg2:#0D0D14;--bg3:#14141E;--bg4:#1C1C28;
    --border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.08);--border3:rgba(255,255,255,0.12);
    --text:#F4F4F5;--text2:#A1A1AA;--text3:#63637A;
    --brand:#6C5CE7;--brand-l:#8B7CF0;--brand-g:rgba(108,92,231,0.12);
    --accent:#22D3EE;--green:#22C55E;--yellow:#FBBF24;--red:#EF4444;--purple:#A78BFA;--pink:#EC4899;
    --font:'Inter',sans-serif;--pixel:'Press Start 2P',monospace;
    --snb-w:240px;--right-w:300px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:10px}
  select{font-family:var(--font);background:var(--bg3);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer;outline:none}
  select:focus{border-color:var(--brand)}

  /* ===== SNB ===== */
  .snb{width:var(--snb-w);height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .snb-logo{padding:18px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s}
  .snb-logo:hover{background:var(--bg3)}
  .snb-logo .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:white}
  .snb-logo .wordmark{font-size:15px;font-weight:900;letter-spacing:-0.5px}
  .snb-logo .tag{font-size:8px;font-weight:700;color:var(--brand-l);background:var(--brand-g);padding:2px 6px;border-radius:4px;margin-left:auto}
  .snb-stats{padding:10px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .snb-stat{padding:7px 8px;background:var(--bg3);border-radius:7px;border:1px solid var(--border)}
  .snb-stat .val{font-size:15px;font-weight:800}.snb-stat .val.green{color:var(--green)}.snb-stat .val.yellow{color:var(--yellow)}.snb-stat .val.brand{color:var(--brand-l)}
  .snb-stat .lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
  .snb-progress{padding:8px 14px;border-bottom:1px solid var(--border)}
  .progress-label{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}
  .progress-bar{height:4px;background:var(--bg4);border-radius:10px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--accent));border-radius:10px;transition:width 0.6s}
  .snb-nav{flex:1;overflow-y:auto;padding:6px 6px}
  .snb-section{margin-bottom:2px}
  .snb-section-title{padding:5px 8px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-radius:5px;transition:background 0.1s}
  .snb-section-title:hover{background:var(--bg3)}
  .snb-section-title .cnt{padding:1px 5px;background:var(--bg4);border-radius:999px;font-size:8px}
  .snb-section-title .arrow{font-size:8px;transition:transform 0.2s}
  .snb-section.collapsed .arrow{transform:rotate(-90deg)}.snb-section.collapsed .snb-items{display:none}
  .snb-item{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;cursor:pointer;transition:all 0.1s;margin-bottom:1px;font-size:11px;color:var(--text2)}
  .snb-item:hover{background:var(--bg3)}.snb-item.active{background:var(--brand-g);color:var(--brand-l)}
  .snb-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .snb-item .dot.done{background:var(--green)}.snb-item .dot.wip{background:var(--yellow);animation:blink 1.5s infinite}.snb-item .dot.wait{background:var(--text3);opacity:0.2}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .snb-item .iname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .snb-item .iqaf{font-size:8px;flex-shrink:0}

  /* ===== MAIN ===== */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .main-scroll{flex:1;overflow-y:auto;padding:20px 24px}
  .overview-title{font-size:20px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
  .overview-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
  .ov-section-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;margin-top:20px}
  .ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
  .ov-card{padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s}
  .ov-card:hover{border-color:var(--border3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.2)}
  .ov-card.done{border-left:3px solid var(--green)}.ov-card.wip{border-left:3px solid var(--yellow)}
  .ov-card .oc-name{font-size:12px;font-weight:700;margin-bottom:2px}
  .ov-card .oc-path{font-size:9px;color:var(--text3);font-family:monospace}
  .ov-card .oc-status{display:inline-block;font-size:8px;font-weight:700;padding:2px 6px;border-radius:999px;margin-top:5px;text-transform:uppercase}
  .ov-card .oc-status.done{background:rgba(34,197,94,0.12);color:var(--green)}
  .ov-card .oc-status.wip{background:rgba(251,191,36,0.12);color:var(--yellow)}
  .ov-card .oc-status.wait{background:var(--bg4);color:var(--text3)}

  .d-title{font-size:20px;font-weight:900;letter-spacing:-0.5px}
  .d-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
  .d-meta{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .d-url{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;font-size:10px;font-family:monospace;color:var(--text3)}
  .d-url-go{padding:3px 10px;background:var(--brand);color:white;border:none;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;transition:background 0.15s}
  .d-url-go:hover{background:var(--brand-l)}.d-url-go:disabled{opacity:0.15;cursor:default}
  .d-agents{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
  .d-agent-chip{display:flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid var(--border2)}
  .info-card{padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-top:14px}
  .info-card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
  .info-card-body{font-size:11px;color:var(--text2);line-height:1.7}

  .preview-section{margin-top:16px}
  .preview-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px 8px 0 0}
  .preview-toolbar .pt-label{font-size:10px;color:var(--text3);font-weight:600;margin-right:auto}
  .preview-device{padding:4px 10px;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.12s;color:var(--text3)}
  .preview-device:hover,.preview-device.active{background:var(--brand-g);color:var(--brand-l);border-color:var(--brand)}
  .preview-size{font-size:9px;color:var(--text3);font-family:monospace;padding:3px 6px;background:var(--bg);border-radius:3px}
  .preview-frame{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:#111;overflow:hidden;display:flex;align-items:flex-start;justify-content:center}
  .preview-frame iframe{border:none;background:white;display:block}
  .preview-empty{padding:80px 40px;text-align:center;color:var(--text3);font-size:12px;width:100%}

  /* ===== RIGHT PANEL ===== */
  .right{width:var(--right-w);height:100vh;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
  .right-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px}
  .right-header .live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
  .right-scroll{flex:1;overflow-y:auto}

  /* Agent Grid 3x2 pixel style */
  .agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:12px}
  .ag-cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);transition:all 0.12s}
  .ag-cell:hover{border-color:var(--border3);background:var(--bg4)}
  .ag-pixel{width:36px;height:36px;image-rendering:pixelated;position:relative}
  /* Pixel art characters using box-shadow pixel technique */
  .ag-pixel canvas{width:36px;height:36px;image-rendering:pixelated}
  .ag-emoji{font-size:24px;line-height:1}
  .ag-role{font-size:8px;color:var(--text3);text-align:center;font-weight:600;line-height:1.2}
  .ag-name-tag{font-family:var(--pixel);font-size:6px;color:var(--text3);margin-top:-2px}

  /* Feedback area below agents */
  .fb-area{padding:8px 12px}
  .fb-accordion{border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
  .fb-acc-head{display:flex;align-items:center;gap:6px;padding:9px 10px;cursor:pointer;transition:background 0.12s;background:var(--bg3)}
  .fb-acc-head:hover{background:var(--bg4)}
  .fb-acc-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .fb-acc-info{flex:1;min-width:0}
  .fb-acc-title{font-size:10px;font-weight:700}
  .fb-acc-counts{display:flex;gap:4px;margin-top:2px}
  .fb-count{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px}
  .fb-count.pass{background:rgba(34,197,94,0.12);color:var(--green)}
  .fb-count.warn{background:rgba(251,191,36,0.12);color:var(--yellow)}
  .fb-count.info{background:rgba(108,92,231,0.12);color:var(--brand-l)}
  .fb-count.none{background:var(--bg4);color:var(--text3)}
  .fb-acc-arrow{font-size:9px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
  .fb-accordion.open .fb-acc-arrow{transform:rotate(180deg)}
  .fb-acc-body{max-height:0;overflow-y:auto;transition:max-height 0.3s cubic-bezier(0.16,1,0.3,1)}
  .fb-accordion.open .fb-acc-body{max-height:600px}
  .fb-acc-content{padding:10px}
  .fb-item{display:flex;align-items:flex-start;gap:5px;padding:3px 0;font-size:9px;color:var(--text2);line-height:1.5}
  .fb-item-icon{flex-shrink:0;margin-top:1px}
  .fb-divider{height:1px;background:var(--border);margin:6px 0}
  .fb-sub-title{font-size:8px;font-weight:700;color:var(--text3);margin-bottom:4px}
  .fb-none{font-size:10px;color:var(--text3);padding:12px 0;opacity:0.5;text-align:center}
</style>
</head>
<body>

<div class="main"><div class="main-scroll" id="mainScroll"></div></div>

</aside>

var allPages=[];sections.forEach(function(s){s.pages.forEach(function(p){p.sectionId=s.id;allPages.push(p)})});
var selectedPage=null,previewDevice='desktop';
var deviceSizes={desktop:{w:1920,h:1080},tablet:{w:768,h:1024},mobile:{w:375,h:812}};

// Agent Grid
function renderAgentGrid(){
  var html='';
  Object.keys(agents).forEach(function(k){
    var a=agents[k];
    html+='<div class="ag-cell"><div class="ag-emoji">'+a.emoji+'</div><div class="ag-name-tag">'+k+'</div><div class="ag-role">'+a.role+'</div></div>';
  });
  document.getElementById('agentGrid').innerHTML=html;
}

// SNB
function renderSnb(){
  var html='',done=0,wip=0;
  allPages.forEach(function(p){if(p.status==='done')done++;if(p.status==='wip')wip++});
  sections.forEach(function(s){
    var sd=s.pages.filter(function(p){return p.status==='done'}).length;
    html+='<div class="snb-section" id="sec-'+s.id+'"><div class="snb-section-title" onclick="toggleSec(\''+s.id+'\')"><span>'+s.icon+' '+s.name+'</span><span style="display:flex;align-items:center;gap:4px"><span class="cnt">'+sd+'/'+s.pages.length+'</span><span class="arrow">▾</span></span></div><div class="snb-items">';
    s.pages.forEach(function(p){
      var idx=allPages.indexOf(p),cls=selectedPage===idx?'snb-item active':'snb-item';
      var qi=p.qaFeedback?(p.qaFeedback.status==='pass'?'<span class="iqaf" style="color:var(--green)">✓</span>':'<span class="iqaf" style="color:var(--yellow)">!</span>'):'';
      html+='<div class="'+cls+'" onclick="selectPage('+idx+')"><span class="dot '+p.status+'"></span><span class="iname">'+p.name+'</span>'+qi+'</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('snbNav').innerHTML=html;
  document.getElementById('sDone').textContent=done;document.getElementById('sWip').textContent=wip;
  document.getElementById('sTotal').textContent=allPages.length;document.getElementById('sLeft').textContent=allPages.length-done-wip;
  var pct=Math.round(done/allPages.length*100);
  document.getElementById('pPct').textContent=pct+'%';document.getElementById('pFill').style.width=pct+'%';
}
function toggleSec(id){document.getElementById('sec-'+id).classList.toggle('collapsed')}

function selectPage(idx){
  selectedPage=idx;var p=allPages[idx];renderSnb();
  var statusOpts=['wait','wip','done'].map(function(s){return '<option value="'+s+'"'+(p.status===s?' selected':'')+'>'+({wait:'⬜ 대기',wip:'🔨 작업중',done:'✅ 완료'}[s])+'</option>'}).join('');
  var agChips=p.agents.map(function(a){return '<div class="d-agent-chip" style="border-color:'+agents[a].color+'25"><span style="font-size:11px">'+agents[a].emoji+'</span><span style="font-size:9px;color:'+agents[a].color+'">'+agents[a].role+'</span></div>'}).join('');

  var ds=deviceSizes[previewDevice];
  var containerW=document.querySelector('.main').offsetWidth-48;
  var scale=Math.min(1,containerW/ds.w);
  var frameH=Math.round(ds.h*scale);

  var html='<div class="d-title">'+p.name+'</div><div class="d-desc">'+p.desc+'</div>';
  html+='<div class="d-meta"><select onchange="changeStatus('+idx+',this.value)">'+statusOpts+'</select>';
  html+='<div class="d-url">'+p.path+'</div>';
  html+='<button class="d-url-go" onclick="window.open(\''+p.file+'\')" '+(p.file?'':'disabled')+'>이동 →</button></div>';
  html+='<div class="d-agents">'+agChips+'</div>';
  if(p.planning) html+='<div class="info-card"><div class="info-card-title">📋 기획 상세</div><div class="info-card-body">'+p.planning+'</div></div>';

  html+='<div class="preview-section"><div class="preview-toolbar"><span class="pt-label">미리보기</span>';
  ['desktop','tablet','mobile'].forEach(function(d){
    html+='<button class="preview-device'+(previewDevice===d?' active':'')+'" onclick="setDevice(\''+d+'\','+idx+')">'+({desktop:'💻 1920px',tablet:'📱 768px',mobile:'📱 375px'}[d])+'</button>';
  });
  html+='<span class="preview-size">'+ds.w+' × '+ds.h+'</span></div>';
  html+='<div class="preview-frame" style="height:'+frameH+'px">';
  if(p.file) html+='<iframe src="'+p.file+'" style="width:'+ds.w+'px;height:'+ds.h+'px;transform:scale('+scale+');transform-origin:top left"></iframe>';
  else html+='<div class="preview-empty">아직 작업 전입니다. 완료되면 여기서 실제 페이지를 미리 확인할 수 있습니다.</div>';
  html+='</div></div>';

  document.getElementById('mainScroll').innerHTML=html;
  renderFeedback(p);
}

function setDevice(d,idx){previewDevice=d;selectPage(idx)}
function changeStatus(idx,val){allPages[idx].status=val;renderSnb();selectPage(idx)}

function renderFeedback(p){
  var html='';
  var qa=p.qaFeedback,gf=p.growthFeedback;
  var qP=qa?qa.passed.length:0,qW=qa?qa.warns.length:0;
  var gD=gf?gf.done.length:0,gS=gf?gf.suggests.length:0;

  // QA accordion (closed by default)
  html+='<div class="fb-accordion" onclick="this.classList.toggle(\'open\')">';
  html+='<div class="fb-acc-head"><div class="fb-acc-icon" style="background:rgba(239,68,68,0.1)">🔍</div><div class="fb-acc-info"><div class="fb-acc-title">QA 검증</div><div class="fb-acc-counts">';
  if(qa){html+='<span class="fb-count '+(qa.status==='pass'?'pass':'warn')+'">'+(qa.status==='pass'?'통과':'수정필요')+'</span><span class="fb-count pass">✓'+qP+'</span><span class="fb-count warn">⚠'+qW+'</span>';}
  else html+='<span class="fb-count none">미검증</span>';
  html+='</div></div><div class="fb-acc-arrow">▾</div></div>';
  html+='<div class="fb-acc-body"><div class="fb-acc-content">';
  if(qa){
    qa.passed.forEach(function(i){html+='<div class="fb-item"><span class="fb-item-icon" style="color:var(--green)">✓</span>'+i+'</div>'});
    if(qW){html+='<div class="fb-divider"></div><div class="fb-sub-title">⚠ 보완 필요</div>';qa.warns.forEach(function(i){html+='<div class="fb-item"><span class="fb-item-icon" style="color:var(--yellow)">⚠</span>'+i+'</div>'});}
  }else html+='<div class="fb-none">아직 검증 전</div>';
  html+='</div></div></div>';

  // Growth accordion (closed by default)
  html+='<div class="fb-accordion" onclick="this.classList.toggle(\'open\')">';
  html+='<div class="fb-acc-head"><div class="fb-acc-icon" style="background:rgba(167,139,250,0.1)">📈</div><div class="fb-acc-info"><div class="fb-acc-title">그로스 피드백</div><div class="fb-acc-counts">';
  if(gf){html+='<span class="fb-count info">완료 '+gD+'</span><span class="fb-count warn">제안 '+gS+'</span>';}
  else html+='<span class="fb-count none">미분석</span>';
  html+='</div></div><div class="fb-acc-arrow">▾</div></div>';
  html+='<div class="fb-acc-body"><div class="fb-acc-content">';
  if(gf){
    gf.done.forEach(function(i){html+='<div class="fb-item"><span class="fb-item-icon" style="color:var(--brand-l)">✓</span>'+i+'</div>'});
    if(gS){html+='<div class="fb-divider"></div><div class="fb-sub-title">💡 보완 제안</div>';gf.suggests.forEach(function(i){html+='<div class="fb-item"><span class="fb-item-icon" style="color:var(--yellow)">💡</span>'+i+'</div>'});}
  }else html+='<div class="fb-none">아직 분석 전</div>';
  html+='</div></div></div>';

  document.getElementById('fbArea').innerHTML=html;
}

function showOverview(){
  selectedPage=null;renderSnb();
  var html='<div class="overview-title">전체 페이지 현황</div><div class="overview-sub">MergeUi 서비스의 모든 페이지 진행 상태</div>';
  sections.forEach(function(s){
    html+='<div class="ov-section-label">'+s.icon+' '+s.name+'</div><div class="ov-grid">';
    s.pages.forEach(function(p){var idx=allPages.indexOf(p);html+='<div class="ov-card '+p.status+'" onclick="selectPage('+idx+')"><div class="oc-name">'+p.name+'</div><div class="oc-path">'+p.path+'</div><span class="oc-status '+p.status+'">'+({done:'완료',wip:'작업중',wait:'대기'}[p.status])+'</span></div>'});
    html+='</div>';
  });
  document.getElementById('mainScroll').innerHTML=html;
  document.getElementById('fbArea').innerHTML='<div class="fb-none">페이지를 선택하면 피드백이 표시됩니다</div>';
}

renderAgentGrid();renderSnb();showOverview();
</script>
