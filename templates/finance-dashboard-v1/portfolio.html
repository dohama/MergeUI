  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/data.js"></script>
  <script src="js/fin-dashboard.js"></script>
  <script>
    applyFinChartDefaults(); var D=FIN_DATA;
    /* Performance line */
    try{new Chart(document.getElementById('perfChart'),{type:'line',data:{labels:D.portfolioPerformance.labels,datasets:[{label:'Portfolio Value',data:D.portfolioPerformance.data,borderColor:'#00B894',backgroundColor:'rgba(0,184,148,0.08)',fill:true,pointBackgroundColor:'#F0F4F3',pointBorderColor:'#00B894',tension:0.4,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:function(v){return '$'+(v/1000)+'k';}}},x:{grid:{display:false}}}}});}catch(e){console.warn(e);}
    /* Allocation donut */
    try{new Chart(document.getElementById('allocChart'),{type:'doughnut',data:{labels:D.allocation.labels,datasets:[{data:D.allocation.data,backgroundColor:D.allocation.colors,borderWidth:0,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:true,cutout:'65%',plugins:{legend:{display:false}}}});}catch(e){console.warn(e);}
    /* Legend */
    var leg=document.getElementById('allocLegend');
    if(leg){leg.innerHTML=D.allocation.labels.map(function(l,i){return '<div class="donut-legend-item"><span class="donut-legend-dot" style="background:'+D.allocation.colors[i]+'"></span><span>'+l+'</span><span class="donut-legend-val">'+D.allocation.data[i]+'%</span></div>';}).join('');}
    /* Holdings */
    var hl=document.getElementById('holdingsList');
    if(hl){hl.innerHTML=D.holdings.map(function(h){return '<div class="holding-row"><div class="holding-info"><div><div class="holding-name">'+h.name+'</div><div class="holding-ticker">'+h.ticker+'</div></div></div><div class="holding-value"><div class="holding-amount">'+h.amount+'</div><div class="holding-change '+h.dir+'">'+h.change+'</div></div></div>';}).join('');}
  </script>
