<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Basic Table — MergeUi Block</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh}
    .demo-wrap{max-width:720px;margin:0 auto;background:var(--merge-bg-surface);border:1px solid var(--merge-border);border-radius:12px;overflow:hidden}

    /* === COPY FROM HERE === */
    .table{
      width:100%;border-collapse:collapse;
      font-family:inherit;font-size:14px;
      color:var(--merge-text-primary);
    }
    .table th{
      text-align:left;
      padding:12px 16px;
      font-size:11px;font-weight:700;
      color:var(--merge-text-muted);
      text-transform:uppercase;letter-spacing:.5px;
      background:var(--merge-bg-surface);
      border-bottom:1px solid var(--merge-border);
    }
    .table td{
      padding:14px 16px;
      border-bottom:1px solid var(--merge-border);
    }
    .table tbody tr:last-child td{border-bottom:none}
    .table tbody tr:hover td{background:var(--merge-bg-raised)}
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <div class="demo-wrap">
    <table class="table" aria-label="Members list">
      <thead>
        <tr><th scope="col">Name</th><th scope="col">Plan</th><th scope="col">Status</th></tr>
      </thead>
      <tbody>
        <tr><td>Alex Kim</td><td>Pro</td><td>Active</td></tr>
        <tr><td>Sam Park</td><td>Free</td><td>Trial</td></tr>
        <tr><td>Jordan Lee</td><td>Team</td><td>Active</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
