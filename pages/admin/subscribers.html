<script>
function escapeHtml(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
window.__membersData = { profiles: [], subMap: {}, dlMap: {} };
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r1 = await sb.from("profiles").select("id, name, email, plan, created_at");
    var r2 = await sb.from("subscriptions").select("user_id, plan, status, current_period_end");
    var r3 = await sb.from("downloads").select("user_id");

    var subMap={};(r2.data||[]).forEach(function(s){subMap[s.user_id]=s;});
    var dlMap={};(r3.data||[]).forEach(function(d){dlMap[d.user_id]=(dlMap[d.user_id]||0)+1;});
    var profiles=r1.data||[];

    // CSV 내보내기용 데이터 보관
    window.__membersData = { profiles: profiles, subMap: subMap, dlMap: dlMap };

    /* Quick stats */
    var active=0,cancelled=0;
    profiles.forEach(function(p){var s=subMap[p.id];if(s&&s.status==="active")active++;else if(s&&(s.status==="cancelled"||s.status==="expired"))cancelled++;});
    var qv=document.querySelectorAll(".qs-val");
    if(qv[0])qv[0].textContent=profiles.length;
    if(qv[1])qv[1].textContent=active;
    if(qv[2])qv[2].textContent=cancelled;

    /* Empty state toggle */
    var emptyDiv=document.querySelector(".card > div[style*='text-align:center']");
    var tbody=document.querySelector(".sub-table tbody");
    var pageInfo=document.querySelector(".page-info");

    if(profiles.length>0){
      if(emptyDiv)emptyDiv.style.display="none";
      tbody.innerHTML=profiles.map(function(p){
        var sub=subMap[p.id]||{};
        var plan=(sub.plan||p.plan||"free").toLowerCase();
        var status=(sub.status||"active").toLowerCase();
        var dl=dlMap[p.id]||0;
        var d=new Date(p.created_at);
        var dateStr=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        var initials=(p.name||"?").charAt(0).toUpperCase();
        return '<tr><td><div class="user-cell"><span class="user-avatar">'+initials+'</span><span class="user-name">'+escapeHtml(p.name||"--")+'</span></div></td><td>'+escapeHtml(p.email||"--")+'</td><td><span class="plan-badge '+plan+'">'+plan+'</span></td><td><span class="status-badge '+status+'">'+status+'</span></td><td>'+dateStr+'</td><td>'+dl+'</td><td><button type="button" class="view-btn">보기</button></td></tr>';
      }).join('');
      if(pageInfo)pageInfo.textContent="표시 "+profiles.length+" / "+profiles.length;
    } else {
      if(emptyDiv)emptyDiv.style.display="";
    }

  } catch(e) { console.error(e); }
});

// 엑셀 다운로드 버튼 연결
document.addEventListener("DOMContentLoaded", function() {
  var btn = document.getElementById("exportBtn");
  if (!btn) return;
  btn.addEventListener("click", function() {
    if (!window.MergeCSV) { alert("CSV 모듈이 로드되지 않았습니다"); return; }
    var d = window.__membersData || { profiles: [], subMap: {}, dlMap: {} };
    if (!d.profiles.length) { alert("내보낼 회원 데이터가 없습니다"); return; }
    var headers = ["이름", "이메일", "플랜", "상태", "가입일", "다운로드 수", "구독 만료일"];
    var rows = d.profiles.map(function(p) {
      var sub = d.subMap[p.id] || {};
      var plan = (sub.plan || p.plan || "free");
      var status = sub.status || "active";
      var dl = d.dlMap[p.id] || 0;
      return [
        p.name || "",
        p.email || "",
        plan,
        status,
        MergeCSV.formatDate(p.created_at),
        dl,
        MergeCSV.formatDate(sub.current_period_end)
      ];
    });
    MergeCSV.export("mergeui_members_" + MergeCSV.timestamp() + ".csv", headers, rows);
  });
});
</script>
