<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Line Chart — MergeUi Block (Pro)</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .demo-wrap{width:100%;max-width:560px}

    /* === COPY FROM HERE === */
    .chart-card{
      padding:20px 24px;
      background:var(--merge-bg-surface);
      border:1px solid var(--merge-border);
      border-radius:12px;
      font-family:inherit;
    }
    .chart-head{
      display:flex;align-items:baseline;justify-content:space-between;
      margin-bottom:12px;
    }
    .chart-title{
      font-size:13px;font-weight:600;
      color:var(--merge-text-muted);
      text-transform:uppercase;letter-spacing:.4px;
    }
    .chart-value{
      font-size:22px;font-weight:800;
      color:var(--merge-text-primary);
      letter-spacing:-.5px;
    }
    .chart-svg{
      width:100%;height:180px;
      display:block;overflow:visible;
    }
    .chart-axis{stroke:var(--merge-border);stroke-width:1}
    .chart-tick{
      font-family:inherit;font-size:10px;
      fill:var(--merge-text-muted);
    }
    .chart-svg{color:var(--merge-chart-1)}
    .chart-line{
      fill:none;stroke:currentColor;stroke-width:2.5;
      stroke-linecap:round;stroke-linejoin:round;
    }
    .chart-fill{fill:url(#mu-line-grad);stroke:none}
    .chart-dot{fill:currentColor;stroke:var(--merge-bg-surface);stroke-width:2}
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <div class="demo-wrap">
    <article class="chart-card" aria-label="Monthly revenue chart">
      <div class="chart-head">
        <span class="chart-title">Monthly Revenue</span>
        <span class="chart-value">$48,290</span>
      </div>
      <svg class="chart-svg" viewBox="0 0 320 180" preserveAspectRatio="none" role="img" aria-label="Revenue trending up Jan to Aug">
        <defs>
          <linearGradient id="mu-line-grad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="currentColor" stop-opacity="0.45"/>
            <stop offset="1" stop-color="currentColor" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <!-- gridlines -->
        <line class="chart-axis" x1="0" y1="40"  x2="320" y2="40"/>
        <line class="chart-axis" x1="0" y1="90"  x2="320" y2="90"/>
        <line class="chart-axis" x1="0" y1="140" x2="320" y2="140"/>
        <!-- area + line: 8 data points (Jan~Aug) -->
        <polygon class="chart-fill" points="0,160 0,120 45,100 90,108 135,72 180,82 225,52 270,40 320,32 320,160"/>
        <polyline class="chart-line" points="0,120 45,100 90,108 135,72 180,82 225,52 270,40 320,32"/>
        <!-- dots -->
        <circle class="chart-dot" cx="0"   cy="120" r="3"/>
        <circle class="chart-dot" cx="45"  cy="100" r="3"/>
        <circle class="chart-dot" cx="90"  cy="108" r="3"/>
        <circle class="chart-dot" cx="135" cy="72"  r="3"/>
        <circle class="chart-dot" cx="180" cy="82"  r="3"/>
        <circle class="chart-dot" cx="225" cy="52"  r="3"/>
        <circle class="chart-dot" cx="270" cy="40"  r="3"/>
        <circle class="chart-dot" cx="320" cy="32"  r="3"/>
        <!-- x-axis labels -->
        <text class="chart-tick" x="0"   y="178">Jan</text>
        <text class="chart-tick" x="90"  y="178">Mar</text>
        <text class="chart-tick" x="180" y="178">May</text>
        <text class="chart-tick" x="270" y="178">Jul</text>
      </svg>
    </article>
  </div>
</body>
</html>
