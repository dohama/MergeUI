<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Switch — MergeUi Block</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}

    /* === COPY FROM HERE === */
    .switch{
      display:inline-flex;align-items:center;gap:12px;
      cursor:pointer;
      user-select:none;
    }
    .switch input{position:absolute;opacity:0;pointer-events:none}
    .switch-slider{
      position:relative;
      width:44px;height:24px;
      background:var(--merge-bg-surface);
      border:1px solid var(--merge-border-strong);
      border-radius:9999px;
      transition:background .2s ease,border-color .2s ease;
      flex-shrink:0;
    }
    .switch-slider::after{
      content:'';
      position:absolute;top:2px;left:2px;
      width:18px;height:18px;
      background:var(--merge-text-muted);
      border-radius:50%;
      transition:transform .2s cubic-bezier(.16,1,.3,1),background .2s ease;
    }
    .switch input:checked + .switch-slider{
      background:var(--merge-brand);
      border-color:var(--merge-brand);
    }
    .switch input:checked + .switch-slider::after{
      transform:translateX(20px);
      background:#FFFFFF;
    }
    .switch input:focus-visible + .switch-slider{
      outline:2px solid var(--merge-brand);outline-offset:2px;
    }
    .switch input:disabled + .switch-slider{opacity:.5;cursor:not-allowed}
    .switch-label{font-size:14px;font-weight:500}
    .switch-desc{display:block;font-size:12px;color:var(--merge-text-muted);font-weight:400;margin-top:2px}
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <label class="switch">
    <input type="checkbox" checked>
    <span class="switch-slider"></span>
    <span class="switch-label">Enable email notifications</span>
  </label>

  <label class="switch">
    <input type="checkbox">
    <span class="switch-slider"></span>
    <span class="switch-label">Marketing emails<span class="switch-desc">Receive product updates and tips</span></span>
  </label>

  <label class="switch">
    <input type="checkbox" disabled>
    <span class="switch-slider"></span>
    <span class="switch-label">Pro feature (locked)</span>
  </label>
</body>
</html>
