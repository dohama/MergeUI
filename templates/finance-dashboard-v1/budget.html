  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <script src="js/fin-dashboard.js"></script>
  <script>
    applyFinChartDefaults(); var D=FIN_DATA;
    try{new Chart(document.getElementById('budgetChart'),{type:'bar',data:{labels:D.budgetMonthly.labels,datasets:[{label:'Budget',data:D.budgetMonthly.budget,backgroundColor:'rgba(0,184,148,0.2)',borderColor:'#00B894',borderWidth:2,borderRadius:8},{label:'Actual',data:D.budgetMonthly.actual,backgroundColor:'#FDCB6E',borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{usePointStyle:true,pointStyle:'circle',padding:20,font:{size:12}}}},scales:{y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:function(v){return '$'+(v/1000)+'k';}}},x:{grid:{display:false}}}}});}catch(e){console.warn(e);}
    var bl=document.getElementById('budgetList');
    if(bl&&D.budget){bl.innerHTML=D.budget.map(function(b){var p=Math.round(b.spent/b.budget*100);var ov=p>100;return '<div class="clay-card" style="padding:var(--fin-space-4);margin-bottom:var(--fin-space-3)"><div class="budget-header"><span class="budget-cat">'+b.icon+' '+b.cat+'</span><span class="budget-amounts"><strong style="color:'+(ov?'var(--fin-error)':'var(--fin-text-primary)')+'">$'+b.spent.toLocaleString()+'</strong> / $'+b.budget.toLocaleString()+' <span style="font-size:12px;color:'+(ov?'var(--fin-error)':'var(--fin-text-muted)')+';margin-left:8px">'+p+'%</span></span></div><div class="progress-bar"><div class="progress-fill" style="width:'+Math.min(p,100)+'%;background:'+b.color+'"></div></div></div>';}).join('');}
  </script>
