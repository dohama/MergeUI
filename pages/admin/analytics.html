<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자: 분석 — MergeUi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366F1'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='900' font-family='sans-serif'>O</text></svg>"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles/tokens.css">
  <link rel="stylesheet" href="../../src/styles/reset.css">
  <link rel="stylesheet" href="../../src/styles/sidebar.css">
  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-font-smoothing:antialiased}body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex}a{color:inherit;text-decoration:none}
    .sidebar{width:240px;height:100vh;background:var(--bg-raised);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0}.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}.sb-logo .mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#EF4444,#F97316);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:white}.sb-logo span{font-size:15px;font-weight:900;letter-spacing:-0.5px}.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}.sb-group{margin-bottom:16px}.sb-label{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:4px 12px;margin-bottom:4px}.sb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:var(--text-muted);transition:all 0.12s;cursor:pointer;font-weight:500}.sb-item:hover{background:rgba(255,255,255,0.03);color:var(--text-secondary)}.sb-item.active{background:rgba(239,68,68,0.1);color:#FCA5A5}.sb-item .sb-icon{width:18px;height:18px;border-radius:4px;border:1.5px solid currentColor;opacity:0.4;flex-shrink:0}.sb-item.active .sb-icon{opacity:0.7}
    .main{margin-left:240px;flex:1;min-height:100vh}.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-raised)}.topbar-left{display:flex;align-items:center;gap:12px}.topbar h1{font-size:20px;font-weight:800}.topbar .admin-badge{padding:3px 10px;background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:10px;font-weight:700;border-radius:6px;text-transform:uppercase;letter-spacing:0.5px}.content{padding:28px}
    .date-filter{display:flex;gap:6px}.date-btn{padding:6px 14px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;font-family:var(--font);transition:all 0.12s}.date-btn:hover{border-color:var(--brand);color:var(--brand-light)}.date-btn.active{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#FCA5A5}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}.stat-card{padding:20px;background:var(--bg-raised);border:1px solid var(--border);border-radius:12px;text-align:center}.sc-val{font-size:28px;font-weight:800}.sc-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}.sc-sub{font-size:11px;margin-top:4px}.sc-up{color:var(--success)}.sc-down{color:#EF4444}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
    .card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;overflow:hidden}.card-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.card-head h2{font-size:15px;font-weight:800}.card-body{padding:20px}
    .funnel{display:flex;flex-direction:column;gap:12px}.funnel-step{display:flex;align-items:center;gap:12px}.funnel-bar-wrap{flex:1;position:relative}.funnel-bar{height:32px;border-radius:6px;display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:600;color:white;transition:width 0.5s}.funnel-rate{font-size:12px;color:var(--text-muted);width:60px;text-align:right;flex-shrink:0}.funnel-label{font-size:12px;font-weight:600;width:80px;flex-shrink:0}
    .page-list{display:flex;flex-direction:column;gap:8px}.page-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-surface);border-radius:8px}.page-name{font-size:13px;font-weight:600}.page-views{font-size:13px;color:var(--text-muted)}.page-bar{height:4px;background:var(--bg-base);border-radius:2px;margin-top:6px;overflow:hidden}.page-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--brand),var(--accent))}
    .sessions-list{display:flex;flex-direction:column;gap:8px}.session-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-surface);border-radius:8px;cursor:pointer;transition:background 0.12s}.session-item:hover{background:rgba(255,255,255,0.04)}.session-avatar{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--brand),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;flex-shrink:0}.session-info{flex:1}.session-name{font-size:13px;font-weight:600}.session-meta{font-size:11px;color:var(--text-muted)}.play-btn{padding:4px 12px;background:var(--bg-raised);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;color:var(--text-secondary);cursor:pointer;font-family:var(--font);transition:all 0.12s}.play-btn:hover{border-color:var(--brand);color:var(--brand-light)}
    .feedback-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.fb-card{padding:20px;background:var(--bg-surface);border-radius:12px;text-align:center}.fb-emoji{font-size:28px;margin-bottom:8px}.fb-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}.fb-val{font-size:20px;font-weight:800}.fb-pct{font-size:11px;color:var(--text-muted)}
    @media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.content{padding:20px}.stats-grid{grid-template-columns:1fr 1fr}.feedback-grid{grid-template-columns:1fr}}
  </style>
  <script src="../../src/js/supabase-client.js" defer></script>
</head>
<body>
  <aside class="sidebar">
    <a href="../../landing/index.html" class="sb-logo" style="text-decoration:none;color:inherit"><span class="mark">A</span><span>MergeUi Admin</span></a>
    <nav class="sb-nav"><div class="sb-group"><div class="sb-label">개요</div><a href="dashboard.html" class="sb-item "><span class="sb-icon"></span> 대시보드</a><a href="subscribers.html" class="sb-item "><span class="sb-icon"></span> 구독자</a><a href="orders.html" class="sb-item "><span class="sb-icon"></span> 주문</a></div><div class="sb-group"><div class="sb-label">콘텐츠</div><a href="themes.html" class="sb-item "><span class="sb-icon"></span> 테마</a><a href="components.html" class="sb-item "><span class="sb-icon"></span> 컴포넌트</a><a href="releases.html" class="sb-item "><span class="sb-icon"></span> 릴리즈</a></div><div class="sb-group"><div class="sb-label">지원</div><a href="inquiries.html" class="sb-item "><span class="sb-icon"></span> 문의</a><a href="analytics.html" class="sb-item active"><span class="sb-icon"></span> 분석</a><a href="settings.html" class="sb-item "><span class="sb-icon"></span> 설정</a></div></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left"><h1>분석</h1><span class="admin-badge">관리자</span></div>
      <div class="date-filter">
        <button type="button" class="date-btn">7D</button>
        <button type="button" class="date-btn active">30D</button>
        <button type="button" class="date-btn">90D</button>
      </div>
    </div>
    <div class="content">

      <div class="stats-grid">
        <div class="stat-card"><div class="sc-val">0</div><div class="sc-label">페이지뷰</div><div class="sc-sub" style="color:var(--text-muted)">—</div></div>
        <div class="stat-card"><div class="sc-val">0</div><div class="sc-label">방문자</div><div class="sc-sub" style="color:var(--text-muted)">—</div></div>
        <div class="stat-card"><div class="sc-val">—</div><div class="sc-label">평균 체류</div><div class="sc-sub" style="color:var(--text-muted)">—</div></div>
        <div class="stat-card"><div class="sc-val">—</div><div class="sc-label">이탈률</div><div class="sc-sub" style="color:var(--text-muted)">—</div></div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-head"><h2>전환 퍼널</h2></div>
          <div class="card-body">
            <div class="funnel">
              <div class="funnel-step"><span class="funnel-label">방문</span><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:0%;background:var(--brand)">0</div></div><span class="funnel-rate">—</span></div>
              <div class="funnel-step"><span class="funnel-label">가입</span><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:0%;background:var(--brand-light)">0</div></div><span class="funnel-rate">—</span></div>
              <div class="funnel-step"><span class="funnel-label">구독</span><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:0%;background:var(--accent)">0</div></div><span class="funnel-rate">—</span></div>
              <div class="funnel-step"><span class="funnel-label">다운로드</span><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:0%;background:var(--success)">0</div></div><span class="funnel-rate">—</span></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><h2>인기 페이지</h2></div>
          <div class="card-body">
            <div class="page-list">
              <div style="text-align:center;padding:32px 24px;color:var(--text-muted);font-size:13px">No page view data yet</div>
            </div>
          </div>
        </div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-head"><h2>최근 세션</h2></div>
          <div class="card-body">
            <div class="sessions-list">
              <div style="text-align:center;padding:48px 24px;color:var(--text-muted)">
                <div style="font-size:40px;margin-bottom:12px;opacity:0.3">&#128250;</div>
                <div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">No sessions recorded</div>
                <div style="font-size:13px">Session recordings will appear here.</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-head"><h2>페이지 피드백</h2></div>
          <div class="card-body">
            <div class="feedback-grid">
              <div class="fb-card"><div class="fb-emoji">&#128077;</div><div class="fb-label">도움됨</div><div class="fb-val">0</div><div class="fb-pct">—</div></div>
              <div class="fb-card"><div class="fb-emoji">&#128528;</div><div class="fb-label">보통</div><div class="fb-val">0</div><div class="fb-pct">—</div></div>
              <div class="fb-card"><div class="fb-emoji">&#128078;</div><div class="fb-label">도움안됨</div><div class="fb-val">0</div><div class="fb-pct">—</div></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
<script>
(function(){var s=JSON.parse(localStorage.getItem('mergeui_session'));if(!s){return;}})();
document.querySelectorAll('.date-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.date-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
  });
});
</script>
<script src="../../src/js/auth.js"></script>
<nav class="mobile-bottom-nav" aria-label="Mobile navigation"><div class="mobile-bottom-nav-inner"><a href="dashboard.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>홈</a><a href="subscribers.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>구독자</a><a href="orders.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>주문</a><a href="settings.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7l-1.4 1.4M6.7 17.3l-1.4 1.4m0-13.4l1.4 1.4m10.6 10.6l1.4 1.4"/></svg>설정</a></div></nav>
<script>
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r = await sb.from("page_views").select("page, created_at");
    console.log("Analytics Supabase", r.data ? r.data.length : 0);
  } catch(e) { console.error("Analytics:", e.message); }
});
</script>
</body>
</html>
