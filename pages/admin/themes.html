<script>
function escapeHtml(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r = await sb.from("themes").select("*").order("created_at", { ascending: false });
    var data=r.data||[];
    {
      var pub=0,draft=0,dlTotal=0;
      data.forEach(function(t){if(t.status==="published")pub++;else draft++;dlTotal+=(t.downloads_count||0);});
      var qv=document.querySelectorAll(".qs-val");
      if(qv[0])qv[0].textContent=data.length;
      if(qv[1])qv[1].textContent=pub;
      if(qv[2])qv[2].textContent=draft;
      if(qv[3])qv[3].textContent=dlTotal.toLocaleString();

      var emptyDiv=document.querySelector(".card > div[style*='text-align:center']");
      var tbody=document.querySelector(".t-table tbody");
      if(data.length>0){
        if(emptyDiv)emptyDiv.style.display="none";
        tbody.innerHTML=data.map(function(t){
          var st=(t.status||"draft").toLowerCase();
          var acc=(t.access||"free").toLowerCase();
          var d=new Date(t.updated_at||t.created_at);
          var ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
          return'<tr><td><div class="theme-cell"><span class="theme-thumb">&#127912;</span><span class="theme-name">'+escapeHtml(t.name||"--")+'</span></div></td><td>'+escapeHtml(t.version||"1.0")+'</td><td><span class="status-badge '+st+'">'+st+'</span></td><td><span class="access-badge '+acc+'">'+acc+'</span></td><td>'+(t.downloads_count||0).toLocaleString()+'</td><td>'+ds+'</td><td><div class="act-btns"><button type="button" class="act-btn">\uD3B8\uC9D1</button><button type="button" class="act-btn danger">\uC0AD\uC81C</button></div></td></tr>';
        }).join('');
      }
    }
    // 편집/삭제 버튼 이벤트 위임
    tbody.addEventListener('click', async function(e) {
      var btn = e.target.closest('.act-btn');
      if (!btn) return;
      var row = btn.closest('tr');
      var idx = Array.from(tbody.children).indexOf(row);
      var theme = data[idx];
      if (!theme) return;
      if (btn.classList.contains('danger')) {
        if (!confirm('정말 "' + (theme.name||'') + '" 테마를 삭제하시겠습니까?')) return;
        var { error } = await sb.from('themes').delete().eq('id', theme.id);
        if (error) { alert('삭제 실패: ' + error.message); return; }
        row.remove(); data.splice(idx, 1);
      } else {
        alert('테마 편집 기능은 준비 중입니다. 곧 업데이트됩니다.');
      }
    });
  } catch(e) { console.error(e); }
});

document.querySelector('.add-btn').addEventListener('click', function() {
  alert('테마 추가 기능은 준비 중입니다. 곧 업데이트됩니다.');
});
</script>
