<script>
function escapeHtml(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r = await sb.from("components").select("*");
    var data=r.data||[];
    var cats = new Set();
    var pub=0, draft=0;
    data.forEach(function(comp) { cats.add(comp.category); if(comp.status==="published")pub++;else draft++; });
    var qv=document.querySelectorAll(".qs-val");
    if(qv[0])qv[0].textContent=data.length;
    if(qv[1])qv[1].textContent=cats.size;
    if(qv[2])qv[2].textContent=pub;
    if(qv[3])qv[3].textContent=draft;

    var emptyDiv=document.querySelector(".card > div[style*='text-align:center']");
    var tbody=document.querySelector(".c-table tbody");

    if(data.length>0){
      if(emptyDiv)emptyDiv.style.display="none";
      tbody.innerHTML=data.map(function(c){
        var catClass=(c.category||"widget").toLowerCase();
        var statusClass=(c.status||"draft").toLowerCase();
        var d=new Date(c.updated_at||c.created_at);
        var dateStr=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        return '<tr><td><div class="comp-cell"><span class="comp-icon">&#129513;</span><span class="comp-name">'+escapeHtml(c.name||"--")+'</span></div></td><td><span class="cat-badge '+catClass+'">'+escapeHtml(c.category||"--")+'</span></td><td>'+escapeHtml(c.version||"1.0")+'</td><td><span class="status-badge '+statusClass+'">'+statusClass+'</span></td><td>'+(c.theme_count||0)+'</td><td>'+dateStr+'</td><td><div class="act-btns"><button type="button" class="act-btn">편집</button><button type="button" class="act-btn danger">삭제</button></div></td></tr>';
      }).join('');
    }
    tbody.addEventListener('click', async function(e) {
      var btn = e.target.closest('.act-btn');
      if (!btn) return;
      var row = btn.closest('tr');
      var idx = Array.from(tbody.children).indexOf(row);
      var comp = data[idx];
      if (!comp) return;
      if (btn.classList.contains('danger')) {
        if (!confirm('정말 "' + (comp.name||'') + '" 컴포넌트를 삭제하시겠습니까?')) return;
        var { error } = await sb.from('components').delete().eq('id', comp.id);
        if (error) { alert('삭제 실패: ' + error.message); return; }
        row.remove(); data.splice(idx, 1);
      } else {
        alert('컴포넌트 편집 기능은 준비 중입니다. 곧 업데이트됩니다.');
      }
    });
  } catch(e) { console.error(e); }
});

document.querySelector('.add-btn').addEventListener('click', function() {
  alert('컴포넌트 추가 기능은 준비 중입니다. 곧 업데이트됩니다.');
});
</script>
