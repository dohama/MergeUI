<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MergeUi</title>
  <meta name="description" content="Sign in to MergeUi to access dashboard templates and components.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236C5CE7'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='900' font-family='sans-serif'>O</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles/tokens.css">
  <link rel="stylesheet" href="../../src/styles/reset.css">
  <style>
    

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    a { color: inherit; text-decoration: none; }

    /* ===== LAYOUT: Two columns ===== */
    .auth-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      width: 100%;
    }

    /* Right: Form */
    .auth-form-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    /* Left: Visual */
    .auth-visual-side {
      background: var(--bg-raised);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .auth-visual-side .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      pointer-events: none;
    }
    .auth-visual-side .orb-1 {
      width: 500px; height: 500px;
      background: var(--brand);
      top: -100px; left: -100px;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .auth-visual-side .orb-2 {
      width: 350px; height: 350px;
      background: var(--accent);
      bottom: -80px; right: -50px;
      animation: orbFloat 25s ease-in-out infinite reverse;
    }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }

    .visual-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px;
    }

    .visual-quote {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.3;
      margin-bottom: 16px;
      max-width: 400px;
    }

    .visual-quote .gradient-text {
      background: linear-gradient(135deg, var(--brand-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .visual-author {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Mini dashboard preview */
    .visual-preview {
      margin-top: 40px;
      width: 360px;
      border-radius: 16px;
      border: 1px solid var(--border-strong);
      overflow: hidden;
      background: var(--bg-surface);
      box-shadow: 0 24px 48px rgba(0,0,0,0.4), 0 0 80px var(--glow-brand);
      transform: perspective(800px) rotateY(-5deg) rotateX(2deg);
    }

    .vp-bar {
      display: flex; gap: 6px; padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
    }
    .vp-dot { width: 8px; height: 8px; border-radius: 50%; }
    .vp-dot.r { background: #FF5F57; }
    .vp-dot.y { background: #FFBD2E; }
    .vp-dot.g { background: #28C840; }

    .vp-body { display: grid; grid-template-columns: 60px 1fr; min-height: 200px; }
    .vp-side { background: rgba(0,0,0,0.2); border-right: 1px solid var(--border); padding: 12px 8px; }
    .vp-side-item { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-bottom: 8px; }
    .vp-side-item.active { background: var(--glow-brand); }
    .vp-main { padding: 14px; }
    .vp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .vp-stat { padding: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; }
    .vp-stat-val { font-size: 16px; font-weight: 800; }
    .vp-stat-lbl { font-size: 8px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
    .vp-chart { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
    .vp-bar-chart {
      flex: 1; border-radius: 2px 2px 0 0;
      background: linear-gradient(to top, var(--brand-dark), var(--brand-light));
      opacity: 0.6;
    }

    /* ===== Form ===== */
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .auth-logo .logo-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: white;
    }

    .auth-logo .logo-text {
      font-size: 20px; font-weight: 900; letter-spacing: -0.5px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
    }

    .auth-card h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* Social buttons */
    .social-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: var(--bg-raised);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      width: 100%;
    }

    .social-btn:hover {
      border-color: var(--text-muted);
      background: var(--bg-surface);
      transform: translateY(-1px);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-strong);
    }

    .divider span {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Form fields */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-raised);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--glow-brand);
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .form-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
      cursor: pointer;
    }

    .form-link {
      font-size: 13px;
      color: var(--brand-light);
      font-weight: 500;
      transition: color 0.2s;
    }

    .form-link:hover {
      color: var(--accent);
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: white;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      box-shadow: 0 0 24px var(--glow-brand);
    }

    .submit-btn:hover {
      background: var(--brand-light);
      transform: translateY(-1px);
      box-shadow: 0 0 40px rgba(108,92,231,0.3);
    }

    .auth-footer {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    .auth-footer a {
      color: var(--brand-light);
      font-weight: 600;
    }

    .auth-footer a:hover {
      color: var(--accent);
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .auth-layout { grid-template-columns: 1fr; }
      .auth-visual-side { display: none; }
      .auth-form-side { padding: 24px; }
    }
  </style>
  <script src="../../src/js/analytics.js" defer></script>
  <script src="../../src/js/supabase-client.js" defer></script>
</head>
<body>

<div class="auth-layout">
  <!-- Left: Visual Side -->
  <div class="auth-visual-side">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="visual-content">
      <div class="visual-quote">
        "Saved me <span class="gradient-text">2 weeks</span> of dashboard UI work."
      </div>
      <div class="visual-author">— Jake Kim, Full-stack Developer</div>

      <div class="visual-preview">
        <div class="vp-bar">
          <span class="vp-dot r"></span><span class="vp-dot y"></span><span class="vp-dot g"></span>
        </div>
        <div class="vp-body">
          <div class="vp-side">
            <div class="vp-side-item active"></div>
            <div class="vp-side-item"></div>
            <div class="vp-side-item"></div>
            <div class="vp-side-item"></div>
            <div class="vp-side-item"></div>
          </div>
          <div class="vp-main">
            <div class="vp-stats">
              <div class="vp-stat"><div class="vp-stat-val">$45.2K</div><div class="vp-stat-lbl">Revenue</div></div>
              <div class="vp-stat"><div class="vp-stat-val">2,340</div><div class="vp-stat-lbl">Users</div></div>
            </div>
            <div class="vp-chart">
              <div class="vp-bar-chart" style="height:35%"></div>
              <div class="vp-bar-chart" style="height:55%"></div>
              <div class="vp-bar-chart" style="height:42%"></div>
              <div class="vp-bar-chart" style="height:78%"></div>
              <div class="vp-bar-chart" style="height:50%"></div>
              <div class="vp-bar-chart" style="height:65%"></div>
              <div class="vp-bar-chart" style="height:88%"></div>
              <div class="vp-bar-chart" style="height:58%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Form Side -->
  <div class="auth-form-side">
    <div class="auth-card">
      <a href="../../landing/index.html" class="auth-logo">
        <span class="logo-mark">O</span>
        <span class="logo-text">MergeUi</span>
      </a>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to access your dashboard templates and components.</p>

      <!-- Social Login -->
      <div class="social-btns">
        <button type="button" class="social-btn" aria-label="Continue with Google">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button type="button" class="social-btn" aria-label="Continue with GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
          Continue with GitHub
        </button>
      </div>

      <div class="divider"><span>or</span></div>

      <!-- Email Form -->
      <form aria-label="Sign in with email">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" aria-required="true">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" aria-required="true">
        </div>
        <div class="form-row">
          <label class="form-check">
            <input type="checkbox"> Remember me
          </label>
          <a href="forgot-password.html" class="form-link">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up for free</a>
      </div>
    </div>
  </div>
</div>

<script>
// Auth utility
const AUTH_KEY = 'mergeui_users';
const SESSION_KEY = 'mergeui_session';

function showError(msg) {
  let el = document.getElementById('auth-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-error';
    el.style.cssText = 'padding:12px 16px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#FCA5A5;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px';
    document.querySelector('form').prepend(el);
  }
  el.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' + msg;
  el.style.display = 'flex';
}

function showSuccess(msg) {
  let el = document.getElementById('auth-success');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-success';
    el.style.cssText = 'padding:12px 16px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:10px;color:#86EFAC;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px';
    document.querySelector('form').prepend(el);
  }
  el.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' + msg;
  el.style.display = 'flex';
}

// MergeDB 로드 대기 함수
function waitForMergeDB(callback) {
  if (typeof MergeDB !== 'undefined') { callback(); return; }
  document.addEventListener('mergedb-ready', callback);
  // 5초 후에도 안 되면 직접 Supabase 로드 시도
  setTimeout(function() {
    if (typeof MergeDB === 'undefined' && typeof initMergeSupabase === 'function') {
      initMergeSupabase();
    }
  }, 3000);
}

// 이메일 로그인
document.querySelector('form').onsubmit = async function(e) {
  e.preventDefault();
  var errEl = document.getElementById('auth-error');
  if (errEl) errEl.style.display = 'none';

  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email || !password) { showError('Please enter email and password.'); return; }

  waitForMergeDB(async function() {
    try {
      var session = await MergeDB.login(email, password);
      showSuccess('Welcome back! Redirecting...');
      var dest = session.role === 'admin' ? '../admin/dashboard.html' : '../subscriber/dashboard.html';
      setTimeout(function() { window.location.href = dest; }, 1000);
    } catch(err) {
      showError(err.message || 'Invalid email or password.');
    }
  });
};

// GitHub/Google OAuth — 직접 Supabase 호출 (MergeDB 대기 없이)
document.querySelectorAll('.social-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var text = btn.textContent.toLowerCase();
    var SUPABASE_URL = 'https://agugcvugqjcetiulezim.supabase.co';
    var redirectTo = window.location.origin + '/pages/subscriber/dashboard.html';

    if (text.indexOf('github') !== -1) {
      window.location.href = SUPABASE_URL + '/auth/v1/authorize?provider=github&redirect_to=' + encodeURIComponent(redirectTo);
    } else if (text.indexOf('google') !== -1) {
      window.location.href = SUPABASE_URL + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(redirectTo);
    }
  });
});
</script>
<script src="../../src/js/cookie-consent.js"></script>
</body>
</html>
