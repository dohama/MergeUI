  <script>
    var D=FIN_DATA,tb=document.getElementById('txnTableBody');
    if(tb&&D.transactions){tb.innerHTML=D.transactions.map(function(t){var bg=t.type==='income'?'rgba(0,184,148,0.08)':'rgba(225,112,85,0.08)';var clr=t.type==='income'?'var(--fin-success)':'var(--fin-error)';var badge=t.type==='income'?'badge-income':'badge-expense';return '<tr><td><div class="txn-row"><div class="txn-icon" style="background:'+bg+'">'+t.icon+'</div><span style="font-weight:600">'+t.desc+'</span></div></td><td>'+t.cat+'</td><td style="font-weight:600;color:'+clr+'">'+t.amount+'</td><td><span class="badge '+badge+'">'+(t.type==='income'?'Income':'Expense')+'</span></td><td>'+t.date+'</td></tr>';}).join('');}
