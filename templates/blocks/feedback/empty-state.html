<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Empty State — MergeUi Block</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center}

    /* === COPY FROM HERE === */
    .empty-state{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;
      padding:64px 32px;
      background:var(--merge-bg-raised);
      border:1px dashed var(--merge-border-strong);
      border-radius:14px;
      max-width:480px;
    }
    .empty-state-icon{
      width:56px;height:56px;
      display:flex;align-items:center;justify-content:center;
      background:var(--merge-bg-surface);
      border-radius:14px;
      color:var(--merge-text-muted);
      margin-bottom:16px;
    }
    .empty-state-title{
      font-size:16px;font-weight:700;
      color:var(--merge-text-primary);
      margin:0 0 6px;
    }
    .empty-state-desc{
      font-size:13px;line-height:1.55;
      color:var(--merge-text-muted);
      margin:0 0 20px;
      max-width:36ch;
    }
    .empty-state-action{
      display:inline-flex;align-items:center;gap:6px;
      padding:9px 18px;
      background:var(--merge-brand);color:#FFFFFF;
      border:none;border-radius:8px;
      font:inherit;font-size:13px;font-weight:600;
      cursor:pointer;
      text-decoration:none;
    }
    .empty-state-action:hover{background:var(--merge-brand-light)}
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <div class="empty-state">
    <div class="empty-state-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>
    <h3 class="empty-state-title">No projects yet</h3>
    <p class="empty-state-desc">Get started by creating your first project. You can invite teammates and track progress in one place.</p>
    <button class="empty-state-action">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create project
    </button>
  </div>
</body>
</html>
