<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Feature Card — MergeUi Block (Pro)</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;gap:16px;flex-wrap:wrap}

    /* === COPY FROM HERE === */
    .feature-card{
      display:flex;flex-direction:column;gap:12px;
      max-width:320px;
      padding:24px;
      background:var(--merge-bg-surface);
      border:1px solid var(--merge-border);
      border-radius:12px;
      font-family:inherit;
    }
    .feature-icon{
      width:40px;height:40px;
      display:flex;align-items:center;justify-content:center;
      background:var(--merge-glow-brand);
      color:var(--merge-brand-light);
      border-radius:10px;
    }
    .feature-title{
      font-size:16px;font-weight:700;
      color:var(--merge-text-primary);
      margin:0;
    }
    .feature-desc{
      font-size:14px;line-height:1.6;
      color:var(--merge-text-secondary);
      margin:0;
    }
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <article class="feature-card">
    <div class="feature-icon" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <h3 class="feature-title">Built for speed</h3>
    <p class="feature-desc">Ship faster with copy-paste components and zero runtime cost.</p>
  </article>

  <article class="feature-card">
    <div class="feature-icon" aria-hidden="true" style="background:rgba(34,211,238,.12);color:var(--merge-accent)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
    </div>
    <h3 class="feature-title">Modular by design</h3>
    <p class="feature-desc">Drop blocks into any framework. No lock-in, no build step required.</p>
  </article>

  <article class="feature-card">
    <div class="feature-icon" aria-hidden="true" style="background:rgba(34,197,94,.12);color:var(--merge-success)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h3 class="feature-title">Accessible by default</h3>
    <p class="feature-desc">WCAG AA contrast, keyboard navigation, and ARIA roles included.</p>
  </article>
</body>
</html>
