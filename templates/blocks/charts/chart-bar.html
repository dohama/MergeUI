<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bar Chart — MergeUi Block (Pro)</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .demo-wrap{width:100%;max-width:560px}

    /* === COPY FROM HERE === */
    .chart-card{
      padding:20px 24px;
      background:var(--merge-bg-surface);
      border:1px solid var(--merge-border);
      border-radius:12px;
      font-family:inherit;
    }
    .chart-head{
      display:flex;align-items:baseline;justify-content:space-between;
      margin-bottom:12px;
    }
    .chart-title{
      font-size:13px;font-weight:600;
      color:var(--merge-text-muted);
      text-transform:uppercase;letter-spacing:.4px;
    }
    .chart-value{
      font-size:22px;font-weight:800;
      color:var(--merge-text-primary);
      letter-spacing:-.5px;
    }
    .chart-svg{width:100%;height:200px;display:block}
    .chart-tick{
      font-family:inherit;font-size:10px;
      fill:var(--merge-text-muted);
    }
    .chart-axis{stroke:var(--merge-border);stroke-width:1}
    .chart-bar{
      transition:opacity .12s;
    }
    .chart-bar:hover{opacity:.85}
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <div class="demo-wrap">
    <article class="chart-card" aria-label="Sales by category bar chart">
      <div class="chart-head">
        <span class="chart-title">Sales by Category</span>
        <span class="chart-value">12,408</span>
      </div>
      <svg class="chart-svg" viewBox="0 0 320 180" role="img" aria-label="Six categories compared">
        <!-- baseline -->
        <line class="chart-axis" x1="0" y1="160" x2="320" y2="160"/>
        <!-- bars: 6 categories, deuteranopia-safe palette -->
        <rect class="chart-bar" x="14"  y="60"  width="32" height="100" rx="4" fill="var(--merge-chart-1)"/>
        <rect class="chart-bar" x="62"  y="40"  width="32" height="120" rx="4" fill="var(--merge-chart-2)"/>
        <rect class="chart-bar" x="110" y="80"  width="32" height="80"  rx="4" fill="var(--merge-chart-6)"/>
        <rect class="chart-bar" x="158" y="30"  width="32" height="130" rx="4" fill="var(--merge-chart-4)"/>
        <rect class="chart-bar" x="206" y="70"  width="32" height="90"  rx="4" fill="var(--merge-chart-5)"/>
        <rect class="chart-bar" x="254" y="50"  width="32" height="110" rx="4" fill="var(--merge-chart-3)"/>
        <!-- x-axis labels -->
        <text class="chart-tick" x="30"  y="176" text-anchor="middle">Web</text>
        <text class="chart-tick" x="78"  y="176" text-anchor="middle">iOS</text>
        <text class="chart-tick" x="126" y="176" text-anchor="middle">Android</text>
        <text class="chart-tick" x="174" y="176" text-anchor="middle">API</text>
        <text class="chart-tick" x="222" y="176" text-anchor="middle">CLI</text>
        <text class="chart-tick" x="270" y="176" text-anchor="middle">Other</text>
      </svg>
    </article>
  </div>
</body>
</html>
