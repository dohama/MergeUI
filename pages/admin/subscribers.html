<script>
function escapeHtml(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(v){if(!v)return '--';var d=new Date(v);if(isNaN(d))return '--';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function effectivePlan(profile, sub){
  // 구독이 active일 때만 sub.plan 사용, 그 외에는 profile.plan (또는 'free') 표시 → 환불·만료된 pro 잔재가 표시되는 문제 해결
  if (sub && (sub.status||'').toLowerCase() === 'active') return (sub.plan || profile.plan || 'free').toLowerCase();
  return (profile.plan || 'free').toLowerCase();
}
function effectiveStatus(sub){ return ((sub && sub.status) || 'active').toLowerCase(); }

window.__membersData = { profiles: [], subMap: {}, dlMap: {}, selected: new Set() };

function renderMembers(){
  var d = window.__membersData;
  var tbody = document.querySelector('.sub-table tbody');
  var emptyDiv = document.querySelector(".card > div[style*='text-align:center']");
  var pageInfo = document.querySelector('.page-info');

  // 필터 값
  var q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  var planF = document.getElementById('planFilter')?.value || 'all';
  var statusF = document.getElementById('statusFilter')?.value || 'all';

  var filtered = d.profiles.filter(function(p){
    var sub = d.subMap[p.id] || {};
    var plan = effectivePlan(p, sub);
    var st = effectiveStatus(sub);
    if (q) {
      var hay = ((p.name||'') + ' ' + (p.email||'')).toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    if (planF !== 'all' && plan !== planF) return false;
    if (statusF !== 'all' && st !== statusF) return false;
    return true;
  });

  // Quick stats (필터와 무관 전체 기준)
  var active=0, cancelled=0;
  d.profiles.forEach(function(p){var s=d.subMap[p.id];if(s&&s.status==='active')active++;else if(s&&(s.status==='cancelled'||s.status==='expired'))cancelled++;});
  var qv = document.querySelectorAll('.qs-val');
  if(qv[0]) qv[0].textContent = d.profiles.length;
  if(qv[1]) qv[1].textContent = active;
  if(qv[2]) qv[2].textContent = cancelled;

  if (filtered.length > 0) {
    if (emptyDiv) emptyDiv.style.display = 'none';
    tbody.innerHTML = filtered.map(function(p){
      var sub = d.subMap[p.id] || {};
      var plan = effectivePlan(p, sub);
      var status = effectiveStatus(sub);
      var dl = d.dlMap[p.id] || 0;
      var checked = d.selected.has(p.id) ? 'checked' : '';
      return '<tr data-uid="'+p.id+'">'
        + '<td class="col-check"><input type="checkbox" class="row-check" data-uid="'+p.id+'" '+checked+'></td>'
        + '<td><span class="user-name">'+escapeHtml(p.name||'--')+'</span></td>'
        + '<td>'+escapeHtml(p.email||'--')+'</td>'
        + '<td><span class="plan-badge '+plan+'">'+plan+'</span></td>'
        + '<td><span class="status-badge '+status+'">'+status+'</span></td>'
        + '<td>'+fmtDate(p.created_at)+'</td>'
        + '<td>'+dl+'</td>'
        + '<td><button type="button" class="view-btn" data-uid="'+p.id+'">보기</button></td>'
        + '</tr>';
    }).join('');
    if(pageInfo) pageInfo.textContent = '표시 '+filtered.length+' / '+d.profiles.length;
  } else {
    tbody.innerHTML = '';
    if (emptyDiv) {
      emptyDiv.style.display = '';
      var title = emptyDiv.querySelector('div:nth-child(2)');
      var sub = emptyDiv.querySelector('div:nth-child(3)');
      if (d.profiles.length === 0) {
        if(title) title.textContent = '등록된 회원 없음';
        if(sub) sub.textContent = '신규 가입이 발생하면 이 목록에 표시됩니다.';
      } else {
        if(title) title.textContent = '검색 결과 없음';
        if(sub) sub.textContent = '필터 조건을 변경해 보세요.';
      }
    }
    if(pageInfo) pageInfo.textContent = '표시 0 / '+d.profiles.length;
  }

  updateSelectionBar();
}

function updateSelectionBar(){
  var d = window.__membersData;
  var bar = document.getElementById('selectionBar');
  var count = document.getElementById('selectedCount');
  if (count) count.textContent = d.selected.size;
  if (bar) bar.classList.toggle('active', d.selected.size > 0);
  // select-all 체크박스 상태 동기화
  var rowChecks = document.querySelectorAll('.row-check');
  var allCheck = document.getElementById('selectAll');
  if (allCheck) {
    var visibleChecked = Array.from(rowChecks).filter(function(c){return c.checked;}).length;
    allCheck.checked = rowChecks.length > 0 && visibleChecked === rowChecks.length;
    allCheck.indeterminate = visibleChecked > 0 && visibleChecked < rowChecks.length;
  }
}

function openDetailModal(uid){
  var d = window.__membersData;
  var p = d.profiles.find(function(x){return x.id===uid;});
  if (!p) return;
  var sub = d.subMap[p.id] || {};
  var dl = d.dlMap[p.id] || 0;
  var plan = effectivePlan(p, sub);
  var status = effectiveStatus(sub);
  var body = document.getElementById('modalBody');
  body.innerHTML = ''
    + '<div class="detail-row"><span class="label">이름</span><span class="value">'+escapeHtml(p.name||'--')+'</span></div>'
    + '<div class="detail-row"><span class="label">이메일</span><span class="value">'+escapeHtml(p.email||'--')+'</span></div>'
    + '<div class="detail-row"><span class="label">현재 플랜</span><span class="value"><span class="plan-badge '+plan+'">'+plan+'</span></span></div>'
    + '<div class="detail-row"><span class="label">구독 상태</span><span class="value"><span class="status-badge '+status+'">'+status+'</span></span></div>'
    + '<div class="detail-row"><span class="label">가입일</span><span class="value">'+fmtDate(p.created_at)+'</span></div>'
    + '<div class="detail-row"><span class="label">구독 시작</span><span class="value">'+fmtDate(sub.current_period_start)+'</span></div>'
    + '<div class="detail-row"><span class="label">구독 만료</span><span class="value">'+fmtDate(sub.current_period_end)+'</span></div>'
    + '<div class="detail-row"><span class="label">총 다운로드</span><span class="value">'+dl+'회</span></div>'
    + '<div class="detail-row"><span class="label">회원 ID</span><span class="value" style="font-family:monospace;font-size:11px">'+escapeHtml(p.id)+'</span></div>';
  document.getElementById('memberDetailModal').classList.add('open');
}

document.addEventListener('mergedb-ready', async function(){
  var sb = MergeDB.client;
  try {
    var r1 = await sb.from('profiles').select('id, name, email, plan, created_at, marketing_consent');
    var r2 = await sb.from('subscriptions').select('user_id, plan, status, current_period_start, current_period_end');
    var r3 = await sb.from('downloads').select('user_id');

    var subMap = {};
    (r2.data||[]).forEach(function(s){
      var existing = subMap[s.user_id];
      if (!existing || (s.status==='active' && existing.status!=='active')) subMap[s.user_id] = s;
    });
    var dlMap = {};
    (r3.data||[]).forEach(function(d){ dlMap[d.user_id] = (dlMap[d.user_id]||0) + 1; });

    window.__membersData.profiles = r1.data || [];
    window.__membersData.subMap = subMap;
    window.__membersData.dlMap = dlMap;
    renderMembers();
  } catch(e) { console.error(e); }
});

// 이벤트 바인딩
document.addEventListener('DOMContentLoaded', function(){
  var searchInput = document.getElementById('searchInput');
  var planFilter = document.getElementById('planFilter');
  var statusFilter = document.getElementById('statusFilter');
  if (searchInput) searchInput.addEventListener('input', renderMembers);
  if (planFilter) planFilter.addEventListener('change', renderMembers);
  if (statusFilter) statusFilter.addEventListener('change', renderMembers);

  // 체크박스 이벤트 (위임)
  document.addEventListener('change', function(e){
    if (e.target.classList.contains('row-check')) {
      var uid = e.target.getAttribute('data-uid');
      if (e.target.checked) window.__membersData.selected.add(uid);
      else window.__membersData.selected.delete(uid);
      updateSelectionBar();
    }
    if (e.target.id === 'selectAll') {
      var checks = document.querySelectorAll('.row-check');
      checks.forEach(function(c){
        c.checked = e.target.checked;
        var uid = c.getAttribute('data-uid');
        if (c.checked) window.__membersData.selected.add(uid);
        else window.__membersData.selected.delete(uid);
      });
      updateSelectionBar();
    }
  });

  // "보기" 버튼 (위임)
  document.addEventListener('click', function(e){
    var btn = e.target.closest('.view-btn');
    if (btn && btn.dataset.uid) openDetailModal(btn.dataset.uid);
  });

  // 선택 해제
  var clearBtn = document.getElementById('clearSelection');
  if (clearBtn) clearBtn.addEventListener('click', function(){
    window.__membersData.selected.clear();
    renderMembers();
  });

  // 모달 닫기
  var modal = document.getElementById('memberDetailModal');
  var closeBtn = document.getElementById('modalClose');
  if (closeBtn) closeBtn.addEventListener('click', function(){ modal.classList.remove('open'); });
  if (modal) modal.addEventListener('click', function(e){ if(e.target===modal) modal.classList.remove('open'); });

  // 엑셀 다운로드 — 선택이 있으면 선택만, 없으면 필터 적용된 전체
  var exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.addEventListener('click', function(){
    if (!window.MergeCSV) { alert('CSV 모듈이 로드되지 않았습니다'); return; }
    var d = window.__membersData;
    var target;
    if (d.selected.size > 0) {
      target = d.profiles.filter(function(p){ return d.selected.has(p.id); });
    } else {
      // 현재 필터 적용된 목록을 기준으로 내보냄
      var q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      var planF = document.getElementById('planFilter')?.value || 'all';
      var statusF = document.getElementById('statusFilter')?.value || 'all';
      target = d.profiles.filter(function(p){
        var sub = d.subMap[p.id] || {};
        var plan = effectivePlan(p, sub);
        var st = effectiveStatus(sub);
        if (q && (((p.name||'')+' '+(p.email||'')).toLowerCase()).indexOf(q) === -1) return false;
        if (planF !== 'all' && plan !== planF) return false;
        if (statusF !== 'all' && st !== statusF) return false;
        return true;
      });
    }
    if (!target.length) { alert('내보낼 회원 데이터가 없습니다'); return; }
    var headers = ['이름','이메일','플랜','상태','가입일','다운로드 수','구독 만료일'];
    var rows = target.map(function(p){
      var sub = d.subMap[p.id] || {};
      return [ p.name||'', p.email||'', effectivePlan(p, sub), effectiveStatus(sub),
        MergeCSV.formatDate(p.created_at), d.dlMap[p.id]||0, MergeCSV.formatDate(sub.current_period_end) ];
    });
    var suffix = d.selected.size > 0 ? '_selected' : '_filtered';
    MergeCSV.export('mergeui_members'+suffix+'_'+MergeCSV.timestamp()+'.csv', headers, rows);
  });

  // 이메일 발송 — 선택이 있으면 선택만, 없으면 plan 필터로
  var emailBtn = document.getElementById('sendEmailBtn');
  if (emailBtn) emailBtn.addEventListener('click', async function(){
    var d = window.__membersData;
    var eventName = prompt('Loops 이벤트 이름 (Loops 대시보드의 트리거 이벤트와 일치해야 함):', 'promo_announcement');
    if (!eventName) return;

    try {
      if (typeof MergeDB === 'undefined' || !MergeDB.client) { alert('서비스 준비 중. 새로고침 후 시도.'); return; }
      var { data: { session } } = await MergeDB.client.auth.getSession();
      if (!session) { alert('로그인이 필요합니다.'); return; }

      var filter = {};
      var targetInfo;
      if (d.selected.size > 0) {
        filter.user_ids = Array.from(d.selected);
        targetInfo = '선택된 '+d.selected.size+'명';
      } else {
        var planF = document.getElementById('planFilter').value;
        if (planF !== 'all') filter.plan = planF;
        targetInfo = '현재 필터 조건의 수신 동의자 전체 (플랜: '+planF+')';
      }

      emailBtn.disabled = true; emailBtn.textContent = '미리보기...';
      var preview = await fetch('/api/v1/admin/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+session.access_token },
        body: JSON.stringify({ filter: filter, eventName: eventName, mode: 'dryRun' })
      }).then(function(r){ return r.json(); });

      if (!preview.count) { alert('발송 대상이 없습니다 (수신 동의 한 회원 중 조건 일치자 0명).'); return; }

      if (!confirm('발송 대상: '+preview.count+'명\n범위: '+targetInfo+'\n이벤트명: '+eventName+'\n\n발송하시겠습니까?')) return;

      emailBtn.textContent = '발송 중...';
      var result = await fetch('/api/v1/admin/send-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+session.access_token },
        body: JSON.stringify({ filter: filter, eventName: eventName, mode: 'send' })
      }).then(function(r){ return r.json(); });

      alert('발송 완료\n성공: '+(result.sent||0)+'\n실패: '+(result.failed||0));
    } catch (e) {
      alert('발송 실패: '+(e.message||'알 수 없는 오류'));
    } finally {
      emailBtn.disabled = false; emailBtn.textContent = '이메일 발송';
    }
  });
});
</script>
</body>
</html>
