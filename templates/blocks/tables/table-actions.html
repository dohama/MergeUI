<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Actions Table — MergeUi Block (Pro)</title>
  <link rel="stylesheet" href="../../../src/styles/tokens.css">
  <style>
    body{margin:0;padding:48px;font-family:var(--merge-font);background:var(--merge-bg-base);color:var(--merge-text-primary);min-height:100vh}
    .demo-wrap{max-width:760px;margin:0 auto;background:var(--merge-bg-surface);border:1px solid var(--merge-border);border-radius:12px;overflow:hidden}

    /* === COPY FROM HERE === */
    .table{
      width:100%;border-collapse:collapse;
      font-family:inherit;font-size:14px;
      color:var(--merge-text-primary);
    }
    .table th{
      text-align:left;
      padding:12px 16px;
      font-size:11px;font-weight:700;
      color:var(--merge-text-muted);
      text-transform:uppercase;letter-spacing:.5px;
      background:var(--merge-bg-surface);
      border-bottom:1px solid var(--merge-border);
    }
    .table td{
      padding:12px 16px;
      border-bottom:1px solid var(--merge-border);
    }
    .table tbody tr:last-child td{border-bottom:none}
    .table tbody tr:hover td{background:var(--merge-bg-raised)}

    .row-actions{display:flex;gap:6px;justify-content:flex-end}
    .row-act{
      padding:6px 12px;
      background:var(--merge-bg-surface);
      border:1px solid var(--merge-border);
      border-radius:6px;
      font-family:inherit;font-size:12px;font-weight:600;
      color:var(--merge-text-secondary);
      cursor:pointer;transition:all .12s;
    }
    .row-act:hover{
      border-color:var(--merge-brand);
      color:var(--merge-brand-light);
    }
    .row-act:focus-visible{outline:2px solid var(--merge-brand);outline-offset:2px}
    .row-act.danger{color:var(--merge-error);border-color:rgba(239,68,68,.2)}
    .row-act.danger:hover{
      background:rgba(239,68,68,.1);
      border-color:var(--merge-error);
      color:var(--merge-error);
    }
    /* === COPY TO HERE === */
  </style>
</head>
<body>
  <div class="demo-wrap">
    <table class="table table-actions" aria-label="Team members with actions">
      <thead>
        <tr>
          <th scope="col">User</th>
          <th scope="col">Role</th>
          <th scope="col" aria-label="Actions"></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Alex Kim</td>
          <td>Admin</td>
          <td>
            <div class="row-actions">
              <button type="button" class="row-act" aria-label="Edit Alex Kim">Edit</button>
              <button type="button" class="row-act danger" aria-label="Delete Alex Kim">Delete</button>
            </div>
          </td>
        </tr>
        <tr>
          <td>Sam Park</td>
          <td>Editor</td>
          <td>
            <div class="row-actions">
              <button type="button" class="row-act" aria-label="Edit Sam Park">Edit</button>
              <button type="button" class="row-act danger" aria-label="Delete Sam Park">Delete</button>
            </div>
          </td>
        </tr>
        <tr>
          <td>Jordan Lee</td>
          <td>Viewer</td>
          <td>
            <div class="row-actions">
              <button type="button" class="row-act" aria-label="Edit Jordan Lee">Edit</button>
              <button type="button" class="row-act danger" aria-label="Delete Jordan Lee">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
