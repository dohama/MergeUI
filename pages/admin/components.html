  <!-- Component Add/Edit Modal -->
  <div class="modal-backdrop" id="componentModal" role="dialog" aria-modal="true" aria-labelledby="componentModalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="componentModalTitle">컴포넌트 추가</h2>
        <button type="button" class="modal-close" id="componentModalClose" aria-label="닫기">&times;</button>
      </div>
      <form id="componentForm" novalidate>
        <div class="modal-body">
          <div class="form-row">
            <label for="cf-name">이름 <span class="req">*</span></label>
            <input type="text" id="cf-name" class="form-input" required maxlength="80" placeholder="예: Primary Button">
          </div>
          <div class="form-row">
            <label for="cf-slug">슬러그 <span class="req">*</span></label>
            <input type="text" id="cf-slug" class="form-input" required maxlength="60" placeholder="예: primary-button" pattern="[a-z0-9_-]+">
            <div class="form-hint">소문자, 숫자, 언더스코어, 하이픈만</div>
          </div>
          <div class="form-row-grid">
            <div class="form-row">
              <label for="cf-category">카테고리 <span class="req">*</span></label>
              <select id="cf-category" class="form-select" required>
                <option value="chart">차트</option>
                <option value="data">데이터</option>
                <option value="widget" selected>위젯</option>
                <option value="form">폼</option>
                <option value="feedback">피드백</option>
                <option value="overlay">오버레이</option>
                <option value="button">버튼</option>
                <option value="card">카드</option>
              </select>
            </div>
            <div class="form-row">
              <label for="cf-badge">배지 <span class="req">*</span></label>
              <select id="cf-badge" class="form-select" required>
                <option value="free" selected>무료</option>
                <option value="pro">Pro</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <label for="cf-version">버전</label>
            <input type="text" id="cf-version" class="form-input" maxlength="20" placeholder="1.0.0" value="1.0.0">
          </div>
          <div class="form-row">
            <div class="switch-row">
              <input type="checkbox" id="cf-public">
              <label for="cf-public">공개</label>
            </div>
            <div class="form-hint">체크 해제 시 임시저장으로 저장됩니다.</div>
          </div>
          <div class="form-error" id="cf-error" role="alert" aria-live="polite"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="cf-cancel">취소</button>
          <button type="submit" class="btn-primary" id="cf-submit">저장</button>
        </div>
      </form>
    </div>

<script>
function escapeHtml(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(v){if(!v)return '--';var d=new Date(v);if(isNaN(d))return '--';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

window.__componentsData = [];
// 한글 라벨 매퍼 (DB 슬러그는 영문 그대로, 화면 표시만 한글)
var catLabelMap = { chart:'차트', data:'데이터', widget:'위젯', form:'폼', feedback:'피드백', overlay:'오버레이', button:'버튼', card:'카드', nav:'내비게이션' };
var statusLabelMap = { published:'공개', draft:'임시저장' };
function catLabel(c){ return catLabelMap[c] || c; }
function statusLabel(s){ return statusLabelMap[s] || s; }

function renderComponents(){
  var data = window.__componentsData;
  var q = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  var catF = document.getElementById('categoryFilter')?.value||'all';
  var badgeF = document.getElementById('badgeFilter')?.value||'all';

  var filtered = data.filter(function(c){
    if (q) {
      var hay = ((c.name||'')+' '+(c.slug||'')+' '+(c.category||'')).toLowerCase();
      if (hay.indexOf(q)===-1) return false;
    }
    if (catF !== 'all' && (c.category||'').toLowerCase() !== catF) return false;
    var badge = (c.badge||'free').toLowerCase();
    if (badgeF !== 'all' && badge !== badgeF) return false;
    return true;
  });

  // Quick stats (전체 기준)
  var cats = new Set();
  var pub=0, draft=0;
  data.forEach(function(c){
    cats.add((c.category||'').toLowerCase());
    if (c.is_public !== false) pub++; else draft++;
  });
  var qv=document.querySelectorAll('.qs-val');
  if(qv[0]) qv[0].textContent = data.length;
  if(qv[1]) qv[1].textContent = cats.size;
  if(qv[2]) qv[2].textContent = pub;
  if(qv[3]) qv[3].textContent = draft;

  var emptyDiv = document.querySelector(".card > div[style*='text-align:center']");
  var tbody = document.querySelector('.c-table tbody');

  if (filtered.length>0) {
    if (emptyDiv) emptyDiv.style.display = 'none';
    tbody.innerHTML = filtered.map(function(c){
      var catClass = (c.category||'widget').toLowerCase();
      var status = (c.is_public !== false ? 'published' : 'draft');
      return '<tr data-cid="'+c.id+'">'
        + '<td><div class="comp-cell"><span class="comp-icon">&#129513;</span><div><span class="comp-name">'+escapeHtml(c.name||'--')+'</span><div style="font-size:11px;color:var(--text-muted);margin-top:2px;font-family:monospace">'+escapeHtml(c.slug||'')+'</div></div></div></td>'
        + '<td><span class="cat-badge '+catClass+'">'+escapeHtml(catLabel(c.category||'--'))+'</span></td>'
        + '<td>'+escapeHtml(c.version||'1.0')+'</td>'
        + '<td><span class="status-badge '+status+'">'+statusLabel(status)+'</span></td>'
        + '<td>'+(c.theme_count||0)+'</td>'
        + '<td>'+fmtDate(c.updated_at||c.created_at)+'</td>'
        + '<td><div class="act-btns"><button type="button" class="act-btn edit" data-cid="'+c.id+'">수정</button><button type="button" class="act-btn danger delete" data-cid="'+c.id+'">삭제</button></div></td>'
        + '</tr>';
    }).join('');
  } else {
    tbody.innerHTML = '';
    if (emptyDiv) {
      emptyDiv.style.display = '';
      var title = emptyDiv.querySelector('div:nth-child(2)');
      var sub = emptyDiv.querySelector('div:nth-child(3)');
      if (data.length === 0) {
        if(title) title.textContent = '컴포넌트 없음';
        if(sub) sub.textContent = '상단의 "컴포넌트 추가"로 시작하세요.';
      } else {
        if(title) title.textContent = '결과 없음';
        if(sub) sub.textContent = '필터를 조정해 주세요.';
      }
    }
  }
}

// ============ Modal helpers ============
var componentModal = {
  el: null, form: null, titleEl: null, errEl: null, mode: 'create', editingId: null,
  prevFocus: null,

  init: function(){
    this.el = document.getElementById('componentModal');
    this.form = document.getElementById('componentForm');
    this.titleEl = document.getElementById('componentModalTitle');
    this.errEl = document.getElementById('cf-error');
    var self = this;
    document.getElementById('componentModalClose').addEventListener('click', function(){ self.close(); });
    document.getElementById('cf-cancel').addEventListener('click', function(){ self.close(); });
    this.el.addEventListener('click', function(e){ if (e.target === self.el) self.close(); });
    document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && self.el.classList.contains('open')) self.close(); });
    this.form.addEventListener('submit', function(e){ e.preventDefault(); self.submit(); });
  },

  open: function(comp){
    this.prevFocus = document.activeElement;
    this.errEl.textContent = '';
    if (comp) {
      this.mode = 'edit';
      this.editingId = comp.id;
      this.titleEl.textContent = '컴포넌트 수정';
      document.getElementById('cf-name').value = comp.name || '';
      document.getElementById('cf-slug').value = comp.slug || '';
      document.getElementById('cf-category').value = comp.category || 'widget';
      document.getElementById('cf-badge').value = comp.badge || 'free';
      document.getElementById('cf-version').value = comp.version || '1.0.0';
      document.getElementById('cf-public').checked = comp.is_public !== false;
    } else {
      this.mode = 'create';
      this.editingId = null;
      this.titleEl.textContent = '컴포넌트 추가';
      this.form.reset();
      document.getElementById('cf-version').value = '1.0.0';
      document.getElementById('cf-category').value = 'widget';
      document.getElementById('cf-badge').value = 'free';
      document.getElementById('cf-public').checked = false;
    }
    this.el.classList.add('open');
    setTimeout(function(){ document.getElementById('cf-name').focus(); }, 30);
  },

  close: function(){
    this.el.classList.remove('open');
    this.errEl.textContent = '';
    if (this.prevFocus && typeof this.prevFocus.focus === 'function') {
      try { this.prevFocus.focus(); } catch(e){}
    }
  },

  submit: async function(){
    var name = document.getElementById('cf-name').value.trim();
    var slug = document.getElementById('cf-slug').value.trim().toLowerCase();
    var category = document.getElementById('cf-category').value;
    var badge = document.getElementById('cf-badge').value;
    var version = document.getElementById('cf-version').value.trim() || '1.0.0';
    var isPublic = document.getElementById('cf-public').checked;

    if (!name) return this.showErr('이름을 입력해 주세요.');
    if (!slug || !/^[a-z0-9_-]+$/.test(slug)) return this.showErr('슬러그는 소문자, 숫자, 언더스코어, 하이픈만 사용 가능합니다.');

    var btn = document.getElementById('cf-submit');
    btn.disabled = true;
    btn.textContent = '저장 중...';
    try {
      if (!MergeDB || !MergeDB.client) throw new Error('서비스 초기화 중입니다');
      var payload = { slug: slug, name: name, category: category, badge: badge, version: version, is_public: isPublic };
      var res;
      if (this.mode === 'edit') {
        payload.updated_at = new Date().toISOString();
        res = await MergeDB.client.from('components').update(payload).eq('id', this.editingId);
      } else {
        res = await MergeDB.client.from('components').insert(payload);
      }
      if (res.error) throw new Error(res.error.message || '저장 실패');
      this.close();
      // refresh list
      var r = await MergeDB.client.from('components').select('*').order('created_at', { ascending: false });
      window.__componentsData = r.data || [];
      renderComponents();
    } catch(e) {
      this.showErr(e.message || '저장 실패');
    } finally {
      btn.disabled = false;
      btn.textContent = '저장';
    }
  },

  showErr: function(msg){ this.errEl.textContent = msg; }
};

document.addEventListener('mergedb-ready', async function(){
  var sb = MergeDB.client;
  try {
    var r = await sb.from('components').select('*').order('created_at', { ascending: false });
    window.__componentsData = r.data || [];
    renderComponents();

    var tbody = document.querySelector('.c-table tbody');
    tbody.addEventListener('click', async function(e){
      var btn = e.target.closest('.act-btn');
      if (!btn) return;
      var cid = btn.getAttribute('data-cid');
      var comp = window.__componentsData.find(function(x){return x.id===cid;});
      if (!comp) return;

      if (btn.classList.contains('delete')) {
        var ok = await AdminModal.showConfirm({
          title: '컴포넌트 삭제',
          message: '"' + (comp.name || '') + '"를 삭제할까요? 되돌릴 수 없습니다.',
          confirmLabel: '삭제', destructive: true
        });
        if (!ok) return;
        var { error } = await sb.from('components').delete().eq('id', comp.id);
        if (error) { alert('삭제 실패: ' + error.message); return; }
        window.__componentsData = window.__componentsData.filter(function(x){return x.id!==cid;});
        renderComponents();
      } else if (btn.classList.contains('edit')) {
        componentModal.open(comp);
      }
    });
  } catch(e) { console.error(e); }
});

// 검색/필터 이벤트 바인딩 + 모달 초기화
document.addEventListener('DOMContentLoaded', function(){
  ['searchInput','categoryFilter','badgeFilter'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.addEventListener(id === 'searchInput' ? 'input' : 'change', renderComponents);
  });
  componentModal.init();
  document.querySelector('.add-btn').addEventListener('click', function(){
    componentModal.open(null);
  });
});
</script>
