<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads — MergeUi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236C5CE7'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='900' font-family='sans-serif'>O</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles/tokens.css">
  <link rel="stylesheet" href="../../src/styles/reset.css">
  <link rel="stylesheet" href="../../src/styles/sidebar.css">
  <style>

    
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex}
    a{color:inherit;text-decoration:none}

    /* Sidebar */
    .sidebar{width:240px;height:100vh;background:var(--bg-raised);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0}
    .sb-logo{padding:20px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
    .sb-logo .mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:white}
    .sb-logo span{font-size:15px;font-weight:900;letter-spacing:-0.5px}
    .sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
    .sb-group{margin-bottom:16px}
    .sb-label{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:4px 12px;margin-bottom:4px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;color:var(--text-muted);transition:all 0.12s;cursor:pointer;font-weight:500}
    .sb-item:hover{background:rgba(255,255,255,0.03);color:var(--text-secondary)}
    .sb-item.active{background:var(--glow-brand);color:var(--brand-light)}
    .sb-item .sb-icon{width:18px;height:18px;border-radius:4px;border:1.5px solid currentColor;opacity:0.4;flex-shrink:0}
    .sb-item.active .sb-icon{opacity:0.7}
    .sb-item .sb-badge{margin-left:auto;padding:1px 6px;background:rgba(108,92,231,0.15);color:var(--brand-light);font-size:10px;font-weight:700;border-radius:4px}
    .sb-footer{padding:16px;border-top:1px solid var(--border)}
    .sb-user{display:flex;align-items:center;gap:10px}
    .sb-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white}
    .sb-user-name{font-size:13px;font-weight:600}
    .sb-user-plan{font-size:10px;color:var(--brand-light)}

    /* Main */
    .main{margin-left:240px;flex:1;min-height:100vh}

    /* Topbar */
    .topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-raised)}
    .topbar-left h1{font-size:20px;font-weight:800}
    .topbar-left p{font-size:12px;color:var(--text-muted)}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .topbar-search{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;min-width:200px}
    .topbar-search svg{width:14px;height:14px;color:var(--text-muted)}
    .topbar-search input{background:none;border:none;color:var(--text-primary);font-size:12px;font-family:var(--font);outline:none;width:100%}
    .topbar-search input::placeholder{color:var(--text-muted)}
    .topbar-noti{width:36px;height:36px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;position:relative;transition:border-color 0.15s}
    .topbar-noti:hover{border-color:var(--border-strong)}
    .topbar-noti .noti-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--brand);border-radius:50%}

    /* Content */
    .content{padding:28px}

    /* Plan banner */
    .plan-banner{padding:20px 24px;background:linear-gradient(135deg,rgba(108,92,231,0.08),rgba(34,211,238,0.05));border:1px solid rgba(108,92,231,0.15);border-radius:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
    .plan-info h3{font-size:14px;font-weight:700;margin-bottom:2px}
    .plan-info p{font-size:12px;color:var(--text-secondary)}
    .plan-info .plan-tag{display:inline-block;padding:3px 8px;background:var(--brand);color:white;font-size:10px;font-weight:700;border-radius:5px;margin-right:8px}
    .plan-upgrade{padding:8px 20px;background:var(--brand);color:white;font-size:12px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all 0.15s;font-family:var(--font)}
    .plan-upgrade:hover{background:var(--brand-light)}

    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .stat-card{padding:20px;background:var(--bg-raised);border:1px solid var(--border);border-radius:12px;transition:border-color 0.15s}
    .stat-card:hover{border-color:var(--border-strong)}
    .stat-card .sc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
    .stat-card .sc-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
    .stat-card .sc-val{font-size:24px;font-weight:800;margin-top:2px}
    .stat-card .sc-sub{font-size:11px;color:var(--text-muted);margin-top:2px}

    /* Two columns */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}

    .card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .card-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .card-head h2{font-size:15px;font-weight:800}
    .card-head .card-link{font-size:12px;color:var(--brand-light);font-weight:600;transition:color 0.15s}
    .card-head .card-link:hover{color:var(--accent)}
    .card-body{padding:20px}
    .stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:24px}
    .stat-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:24px}
    .stat-label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px}
    .stat-value{font-size:32px;font-weight:900;letter-spacing:-1px}
    .filter-bar{display:flex;gap:12px;margin-bottom:24px;align-items:center}
    .search-input{flex:1;padding:10px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:13px;font-family:var(--font);outline:none;transition:border-color 0.15s}
    .search-input:focus{border-color:var(--brand)}
    .search-input::placeholder{color:var(--text-muted)}
    .filter-select{padding:10px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:13px;font-family:var(--font);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;padding-right:32px;background-repeat:no-repeat;background-position:right 12px center}
    .filter-select:focus{border-color:var(--brand)}
    .dl-table{width:100%;border-collapse:collapse}
    .dl-table th{text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
    .dl-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border)}
    .dl-table tr:last-child td{border:none}
    .dl-table tr:hover{background:rgba(255,255,255,0.01)}
    .dl-table .item-name{font-weight:600}
    .dl-table .item-type{font-size:10px;color:var(--text-muted);margin-left:6px}
    .dl-btn{padding:6px 14px;background:var(--brand);color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background 0.15s;white-space:nowrap}
    .dl-btn:hover{background:var(--brand-dark)}
    .empty-state{display:none;text-align:center;padding:48px 20px;color:var(--text-muted);font-size:14px}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.content{padding:20px}.stats-row{grid-template-columns:1fr}.filter-bar{flex-direction:column}.dl-table th,.dl-table td{padding:10px 12px}}
  </style>
  <script src="../../src/js/analytics.js" defer></script>
  <script src="../../src/js/supabase-client.js" defer></script>
</head>
<body>
  <aside class="sidebar">
    <a href="../../landing/index.html" class="sb-logo" style="text-decoration:none;color:inherit"><span class="mark">O</span><span>MergeUi</span></a>
    <nav class="sb-nav">
      <div class="sb-group"><div class="sb-label">Main</div>
        <a href="dashboard.html" class="sb-item"><span class="sb-icon"></span> Dashboard</a>
        <a href="library.html" class="sb-item"><span class="sb-icon"></span> Library</a>
      </div>
      <div class="sb-group"><div class="sb-label">Library</div>
        <a href="downloads.html" class="sb-item active"><span class="sb-icon"></span> Downloads</a>
      </div>
      <div class="sb-group"><div class="sb-label">Account</div>
        <a href="settings.html" class="sb-item"><span class="sb-icon"></span> Settings</a>
        <a href="billing.html" class="sb-item"><span class="sb-icon"></span> Billing</a>
      </div>
    </nav>
    <div class="sb-footer">
      <div class="sb-user"><div class="sb-avatar">U</div><div><div class="sb-user-name">User</div><div class="sb-user-plan">Free Plan</div></div></div>
      <button onclick="logout()" style="width:100%;margin-top:12px;padding:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:#FCA5A5;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.15s">Sign Out</button>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Downloads</h1>
        <p>Your download history</p>
      </div>
    </header>
    <div class="content">
      <section class="stats-row" aria-label="Download statistics">
        <div class="stat-card"><div class="stat-label">Total Downloads</div><div class="stat-value">0</div></div>
        <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value">0</div></div>
      </section>
      <div class="filter-bar">
        <input type="text" class="search-input" placeholder="Search downloads..." aria-label="Search downloads">
        <select class="filter-select" aria-label="Filter by date">
          <option>All Time</option>
          <option>This Month</option>
          <option>Last 30 Days</option>
        </select>
      </div>
      <div class="card">
        <div class="card-head"><h2>Download History</h2></div>
        <div class="card-body" style="padding:0">
          <table class="dl-table">
            <thead><tr><th>Theme / Component</th><th>Version</th><th>Date</th><th>Size</th><th>Action</th></tr></thead>
            <tbody>
            </tbody>
          </table>
          <div class="empty-state" style="display:block">
            <div style="font-size:40px;margin-bottom:12px;opacity:0.3">&#128229;</div>
            <div style="font-size:15px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">No downloads yet</div>
            <div style="font-size:13px">Browse themes to get started.</div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
  (function(){var session=JSON.parse(localStorage.getItem("mergeui_session"));if(!session){return;}var n=document.querySelector(".sb-user-name");if(n)n.textContent=session.name||"User";var p=document.querySelector(".sb-user-plan");if(p)p.textContent=(session.plan||"Free")+" Plan";var a=document.querySelector(".sb-avatar");if(a)a.textContent=(session.name||"U").charAt(0).toUpperCase();})();function logout(){localStorage.removeItem("mergeui_session");window.location.href="../auth/login.html";}

  // Load downloads from DB
  document.addEventListener('mergedb-ready', async function() {
    try {
      var downloads = await MergeDB.getMyDownloads();

      // Update stats
      var statValues = document.querySelectorAll('.stat-value');
      var now = new Date();
      var thisMonth = downloads.filter(function(d) {
        var dt = new Date(d.downloaded_at);
        return dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear();
      });
      if (statValues[0]) statValues[0].textContent = downloads.length;
      if (statValues[1]) statValues[1].textContent = thisMonth.length;

      // Update table
      var tbody = document.querySelector('.dl-table tbody');
      var emptyState = document.querySelector('.empty-state');
      if (!downloads || downloads.length === 0) {
        if (tbody) tbody.innerHTML = '';
        if (emptyState) emptyState.style.display = 'block';
        return;
      }

      if (tbody) {
        tbody.innerHTML = downloads.map(function(d) {
          var name = (d.themes && d.themes.name) || (d.components && d.components.name) || 'Unknown';
          var type = d.themes ? 'Theme' : 'Component';
          var version = d.version || '-';
          var date = new Date(d.downloaded_at);
          var dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          return '<tr><td><span class="item-name">' + name + '</span><span class="item-type">' + type + '</span></td><td>v' + version + '</td><td>' + dateStr + '</td><td>-</td><td><button class="dl-btn">&#8595; Re-download</button></td></tr>';
        }).join('');
      }

      // Wire up search filter
      var searchInput = document.querySelector('.search-input');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          var q = searchInput.value.toLowerCase();
          var rows = tbody.querySelectorAll('tr');
          rows.forEach(function(row) {
            var name = row.querySelector('.item-name');
            row.style.display = (!q || (name && name.textContent.toLowerCase().indexOf(q) !== -1)) ? '' : 'none';
          });
        });
      }
    } catch (e) {
      console.warn('Failed to load downloads from DB:', e);
    }
  });
  </script>
<script src="../../src/js/auth.js"></script>
<nav class="mobile-bottom-nav" aria-label="Mobile navigation"><div class="mobile-bottom-nav-inner"><a href="dashboard.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home</a><a href="library.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>Library</a><a href="downloads.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Downloads</a><a href="settings.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7l-1.4 1.4M6.7 17.3l-1.4 1.4m0-13.4l1.4 1.4m10.6 10.6l1.4 1.4"/></svg>Settings</a></div></nav>
</body>
</html>
