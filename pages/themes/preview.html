  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — MergeUi</title>
  <meta name="description" content="Live preview of MergeUi dashboard theme.">
  <link rel="canonical" href="https://mergeui.com/themes/preview">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236C5CE7'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='900' font-family='sans-serif'>O</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles/tokens.css">
  <link rel="stylesheet" href="../../src/styles/reset.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:var(--font);background:var(--bg-base);color:var(--text-primary)}
    a{color:inherit;text-decoration:none}

    .control-bar{height:52px;background:var(--bg-raised);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
    .cb-left{display:flex;align-items:center;gap:14px}
    .cb-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;background:none;border:none;font-family:var(--font);transition:color 0.15s}
    .cb-back:hover{color:var(--text-primary)}
    .cb-back svg{width:16px;height:16px}
    .cb-divider{width:1px;height:20px;background:var(--border)}
    .cb-theme-name{font-size:14px;font-weight:800;color:var(--text-primary)}
    .cb-center{display:flex;gap:4px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;padding:3px}
    .cb-device{padding:6px 18px;font-size:12px;font-weight:600;border-radius:8px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-family:var(--font);transition:all 0.15s}
    .cb-device.active{background:var(--brand);color:white}
    .cb-device:hover:not(.active){color:var(--text-secondary)}
    .cb-right{display:flex;align-items:center;gap:10px}
    .cb-cta{padding:8px 24px;background:var(--brand);color:white;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:var(--font);transition:all 0.15s}
    .cb-cta:hover{background:var(--brand-light)}

    .preview-viewport{height:calc(100vh - 52px);display:flex;align-items:flex-start;justify-content:center;overflow:auto;background:#C8CDD3;padding:24px}
    .preview-frame{border:none;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);transition:width 0.4s ease, height 0.4s ease;background:white;transform-origin:top center}

    @media(max-width:768px){
      .cb-center{display:none}
      .cb-theme-name{font-size:12px}
      .preview-viewport{padding:12px}
    }
  </style>
  <script src="../../src/js/analytics.js" defer></script>
</head>
<body>
  <div class="control-bar">
    <div class="cb-left">
      <button type="button" class="cb-back" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
      <span class="cb-divider"></span>
      <span class="cb-theme-name" id="themeName">Theme Preview</span>
    </div>
    <div class="cb-center">
      <button type="button" class="cb-device active" data-device="desktop">Desktop</button>
      <button type="button" class="cb-device" data-device="tablet">Tablet</button>
      <button type="button" class="cb-device" data-device="mobile">Mobile</button>
    </div>
    <div class="cb-right">
      <a href="detail.html" class="cb-cta" id="ctaLink">Get This Theme</a>
    </div>
  </div>

  <div class="preview-viewport" id="viewport">
    <iframe class="preview-frame" id="previewFrame" src="" style="width:1280px;height:100%;pointer-events:auto" sandbox="allow-scripts" oncontextmenu="return false"></iframe>
  </div>

<script>
(function(){
  /* 테마별 프리뷰 URL 매핑 */
  var themeUrls = {
    'softdesk': '../../templates/softdesk-v1/index.html',
    'pulse-admin': '../../templates/pulse-admin-v1/index.html'
  };

  /* URL 파라미터에서 테마 슬러그 가져오기 */
  var params = new URLSearchParams(window.location.search);
  var slug = params.get('theme') || 'softdesk';

  /* 테마 이름 표시 */
  var name = slug.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  document.getElementById('themeName').textContent = name;
  document.title = name + ' Preview — MergeUi';

  /* CTA 링크 */
  var ctaLink = document.getElementById('ctaLink');
  if (ctaLink) ctaLink.href = 'detail.html?theme=' + slug;

  /* iframe에 실제 테마 로드 */
  var frame = document.getElementById('previewFrame');
  var src = themeUrls[slug];
  if (src) {
    frame.src = src;
  } else {
    frame.srcdoc = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#636E72;font-size:18px">This theme preview is coming soon.</div>';
  }

  /* 디바이스 전환 */
  var devices = { desktop: { w: 1280 }, tablet: { w: 768 }, mobile: { w: 375 } };

  document.querySelectorAll('.cb-device').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.cb-device').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      var d = this.getAttribute('data-device');
      var w = devices[d].w;
      var vp = document.getElementById('viewport');
      var containerW = vp.clientWidth - 48;

      frame.style.width = w + 'px';

      /* 화면보다 크면 축소 */
      if (w > containerW) {
        var scale = containerW / w;
        frame.style.transform = 'scale(' + scale + ')';
        frame.style.transformOrigin = 'top center';
      } else {
        frame.style.transform = 'none';
      }
    });
  });

  /* 초기 크기 조정 */
  window.addEventListener('load', function() {
    var vp = document.getElementById('viewport');
    var containerW = vp.clientWidth - 48;
    if (1280 > containerW) {
      var scale = containerW / 1280;
      frame.style.transform = 'scale(' + scale + ')';
      frame.style.transformOrigin = 'top center';
    }
  });
})();
</script>
<script src="../../src/js/auth.js"></script>
<script src="../../src/js/cookie-consent.js"></script>
</body>
</html>
