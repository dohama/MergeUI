<script>
function escapeHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener("mergedb-ready", async function() {
  var sb = MergeDB.client;
  try {
    var r = await sb.from("inquiries").select("*").order("created_at", { ascending: false });
    var data=r.data||[];
    var o=0,rp=0,cl=0;
    data.forEach(function(i){if(i.status==="open")o++;else if(i.status==="replied")rp++;else cl++;});
    var qv=document.querySelectorAll(".qs-val");
    if(qv[0])qv[0].textContent=o;
    if(qv[1])qv[1].textContent=rp;
    if(qv[2])qv[2].textContent=cl;
    var emptyDiv=document.querySelector(".card > div[style*='text-align:center']");
    var tbody=document.querySelector(".i-table tbody");
    var pageInfo=document.querySelector(".page-info");
    if(data.length>0){
      if(emptyDiv)emptyDiv.style.display="none";
      tbody.innerHTML=data.map(function(inq){
        var st=(inq.status||"open").toLowerCase();
        var pri=(inq.priority||"low").toLowerCase();
        var d=new Date(inq.created_at);
        var ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
        return'<tr><td><span class="ticket-id">'+escapeHtml((inq.id||"").substring(0,8))+'</span></td><td><span class="subject">'+escapeHtml(inq.subject||"--")+'</span></td><td><div class="from-cell"><span class="from-name">'+escapeHtml(inq.name||"--")+'</span><span class="from-email">'+escapeHtml(inq.email||"")+'</span></div></td><td><span class="status-badge '+st+'">'+st+'</span></td><td><span class="priority-dot '+pri+'"></span> '+pri+'</td><td>'+ds+'</td><td><button type="button" class="act-btn">보기</button></td></tr>';
      }).join('');
      if(pageInfo)pageInfo.textContent="표시 "+data.length+" / "+data.length;
    }
  } catch(e) { console.error(e); }
});
</script>
