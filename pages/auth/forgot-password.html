<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — MergeUi</title>
  <meta name="description" content="Reset your MergeUi password.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236C5CE7'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='900' font-family='sans-serif'>O</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles/tokens.css">
  <link rel="stylesheet" href="../../src/styles/reset.css">
  <style>
    

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    a { color: inherit; text-decoration: none; }

    .auth-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      width: 100%;
    }

    .auth-form-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .auth-visual-side {
      background: var(--bg-raised);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .auth-visual-side .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      pointer-events: none;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: var(--brand);
      top: -100px; left: -100px;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: var(--accent);
      bottom: -80px; right: -50px;
      animation: orbFloat 25s ease-in-out infinite reverse;
    }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }

    .visual-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px;
    }

    .visual-quote {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.3;
      margin-bottom: 16px;
      max-width: 400px;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--brand-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .visual-author {
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .auth-logo .logo-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: white;
    }

    .auth-logo .logo-text {
      font-size: 20px; font-weight: 900; letter-spacing: -0.5px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
    }

    .auth-card h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .auth-card .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-raised);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--glow-brand);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: white;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      box-shadow: 0 0 24px var(--glow-brand);
    }

    .submit-btn:hover {
      background: var(--brand-light);
      transform: translateY(-1px);
      box-shadow: 0 0 40px rgba(108,92,231,0.3);
    }

    .auth-footer {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    .auth-footer a {
      color: var(--brand-light);
      font-weight: 600;
    }

    .auth-footer a:hover {
      color: var(--accent);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 32px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .auth-layout { grid-template-columns: 1fr; }
      .auth-visual-side { display: none; }
      .auth-form-side { padding: 24px; }
    }
  </style>
  <script src="../../src/js/analytics.js" defer></script>
  <script src="../../src/js/supabase-client.js" defer></script>
</head>
<body>

<div class="auth-layout">
  <!-- Left: Visual Side -->
  <div class="auth-visual-side">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="visual-content">
      <div class="visual-quote">
        "Don't worry, it happens to the <span class="gradient-text">best of us</span>."
      </div>
      <div class="visual-author">— We'll get you back in no time</div>
    </div>
  </div>

  <!-- Right: Form Side -->
  <div class="auth-form-side">
    <div class="auth-card">
      <a href="../../landing/index.html" class="auth-logo">
        <span class="logo-mark">O</span>
        <span class="logo-text">MergeUi</span>
      </a>

      <a href="login.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Back to sign in
      </a>

      <h1>Reset password</h1>
      <p class="subtitle">Enter the email address associated with your account and we'll send you a link to reset your password.</p>

      <form>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
        </div>
        <button type="submit" class="submit-btn">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        Remember your password? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
const AUTH_KEY = 'mergeui_users';

function getUsers() {
  return JSON.parse(localStorage.getItem(AUTH_KEY) || '[]');
}

function showError(msg) {
  let el = document.getElementById('auth-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-error';
    el.style.cssText = 'padding:12px 16px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#FCA5A5;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px';
    document.querySelector('form').prepend(el);
  }
  el.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' + msg;
  el.style.display = 'flex';
  var s = document.getElementById('auth-success');
  if (s) s.style.display = 'none';
}

function showSuccess(msg) {
  let el = document.getElementById('auth-success');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-success';
    el.style.cssText = 'padding:12px 16px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:10px;color:#86EFAC;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px';
    document.querySelector('form').prepend(el);
  }
  el.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' + msg;
  el.style.display = 'flex';
  var e = document.getElementById('auth-error');
  if (e) e.style.display = 'none';
}

// Supabase 비밀번호 재설정
document.addEventListener('mergedb-ready', function() {
  document.querySelector('form').onsubmit = async function(e) {
    e.preventDefault();
    var errEl = document.getElementById('auth-error');
    if (errEl) errEl.style.display = 'none';

    var email = document.getElementById('email').value.trim();
    if (!email) { showError('Please enter your email address.'); return; }

    try {
      await MergeDB.resetPassword(email);
      showSuccess('Reset link sent! Please check your inbox.');
    } catch(err) {
      showError(err.message || 'Failed to send reset email.');
    }
  };
});
</script>
</body>
</html>
